<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFA GAMES</title>
    <link rel="stylesheet" href="style.css">
    <style>
    /* ============ SPA SPECIFIC ============ */
    #app {
        padding-top: 62px;
        min-height: 100vh;
        display: flex; flex-direction: column;
    }
    #app-content {
        flex: 1; max-width: 1100px; width: 100%; margin: 0 auto; padding: 24px;
    }

    /* ============ TEAM GRID ============ */
    .hero-banner {
        position: relative; text-align: center; padding: 50px 20px 30px;
        background: radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.08) 0%, transparent 50%),
                    radial-gradient(ellipse at 80% 50%, rgba(233,69,96,0.08) 0%, transparent 50%);
        margin-bottom: 0;
    }
    .hero-banner h1 { font-size: 2.8em; font-weight: 800; margin-bottom: 8px; }
    .hero-banner p { color: var(--text-dim); font-size: 1.1em; }

    .section-header {
        display: flex; justify-content: space-between; align-items: center;
        margin: 28px 0 16px; padding-bottom: 8px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .section-header h2 { font-size: 1.4em; }

    .team-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px;
        margin-bottom: 32px;
    }
    .player-card {
        background: var(--bg-card); border-radius: 14px; padding: 18px;
        border: 1px solid rgba(255,255,255,0.04); cursor: pointer;
        transition: transform 0.25s, box-shadow 0.25s; position: relative; overflow: hidden;
    }
    .player-card:hover {
        transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,212,255,0.12);
    }
    .player-card::after {
        content: '→'; position: absolute; top: 14px; right: 16px;
        font-size: 1.2em; color: var(--text-dim); opacity: 0;
        transition: opacity 0.2s, transform 0.2s;
    }
    .player-card:hover::after { opacity: 1; transform: translateX(4px); }

    .pc-header {
        display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
    }
    .pc-icon {
        width: 52px; height: 52px; border-radius: 10px; flex-shrink: 0;
        border: 2px solid rgba(0,212,255,0.3); overflow: hidden; background: var(--bg-surface);
    }
    .pc-icon img { width: 100%; height: 100%; object-fit: cover; }
    .pc-name { font-size: 1.15em; font-weight: 700; line-height: 1.1; }
    .pc-name .pc-tag { color: var(--text-dim); font-weight: 400; font-size: 0.6em; }
    .pc-level { font-size: 0.75em; color: var(--text-dim); }

    .pc-rank {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px;
    }
    .pc-tier { font-weight: 800; font-size: 1em; }
    .pc-lp { font-size: 0.8em; color: var(--primary); }
    .pc-wr { font-size: 0.75em; color: var(--text-dim); margin-left: auto; }

    .pc-no-rank {
        text-align: center; padding: 8px; color: var(--text-dim);
        font-size: 0.85em; margin-bottom: 10px;
    }

    .pc-last-game {
        font-size: 0.75em; color: var(--text-dim);
        display: flex; align-items: center; gap: 5px;
    }
    .pc-last-game .dot {
        width: 6px; height: 6px; border-radius: 50%;
    }
    .pc-last-game .dot.green { background: #4caf50; }
    .pc-last-game .dot.gold { background: #c89b3c; }

    .pc-loader {
        display: flex; align-items: center; justify-content: center; min-height: 80px;
    }

    /* ============ PROFILE VIEW ============ */
    .profile-view { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .pv-banner {
        position: relative; padding: 28px; border-radius: 16px; margin-bottom: 20px;
        background: linear-gradient(135deg, #0f1a2e 0%, #1a1a2e 50%, #0d0d1a 100%);
        overflow: hidden;
    }
    .pv-bg { position: absolute; inset: 0; opacity: 0.15;
        background: radial-gradient(ellipse at 30% 50%, rgba(0,212,255,0.3) 0%, transparent 60%);
    }
    .pv-inner { position: relative; z-index: 1; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .pv-icon {
        width: 80px; height: 80px; border-radius: 14px; border: 3px solid var(--primary);
        overflow: hidden; flex-shrink: 0; background: var(--bg-card);
    }
    .pv-icon img { width: 100%; height: 100%; object-fit: cover; }
    .pv-name { font-size: 2em; font-weight: 800; line-height: 1.1; }
    .pv-name .pv-tag { color: var(--text-dim); font-weight: 400; font-size: 0.5em; }
    .pv-region {
        display: inline-flex; align-items: center; gap: 5px; margin-top: 6px;
        background: rgba(0,212,255,0.15); color: var(--primary);
        padding: 3px 10px; border-radius: 6px; font-size: 0.8em; font-weight: 700;
    }

    .pv-stats {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px; margin-bottom: 20px;
    }
    .pv-stat {
        background: var(--bg-card); border-radius: 10px; padding: 14px; text-align: center;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .pv-stat .ps-label { font-size: 0.65em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .pv-stat .ps-value { font-size: 1.8em; font-weight: 800; color: var(--primary); }
    .pv-stat .ps-sub { font-size: 0.7em; color: var(--text-dim); margin-top: 2px; }

    .pv-section {
        margin-bottom: 24px;
    }
    .pv-section h3 {
        font-size: 1.15em; margin-bottom: 12px; color: var(--text);
        display: flex; align-items: center; gap: 8px;
        padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .pv-mastery {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px;
    }
    .pv-mastery-item {
        background: var(--bg-card); border-radius: 10px; padding: 14px 10px;
        text-align: center; border: 1px solid rgba(255,255,255,0.04); position: relative;
    }
    .pv-mastery-item img { width: 48px; height: 48px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.06); }
    .pv-mastery-item .pvm-name { font-size: 0.8em; font-weight: 600; margin-top: 6px; }
    .pv-mastery-item .pvm-lvl {
        position: absolute; top: 4px; right: 4px;
        background: var(--accent); color: #fff; font-size: 0.55em;
        padding: 2px 5px; border-radius: 4px; font-weight: 800;
    }
    .pv-mastery-item .pvm-pts { font-size: 0.7em; color: var(--text-dim); margin-top: 2px; }

    /* MATCH CARDS */
    .pv-match {
        border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
        border: 1px solid rgba(255,255,255,0.04); position: relative; overflow: hidden;
    }
    .pv-match.win { background: rgba(76,175,80,0.06); }
    .pv-match.loss { background: rgba(239,83,80,0.06); }
    .pv-match::before {
        content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .pv-match.win::before { background: #4caf50; }
    .pv-match.loss::before { background: #ef5350; }

    .pv-match-header {
        display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    }
    .pv-match-result { font-size: 0.7em; font-weight: 800; text-transform: uppercase; }
    .pv-match.win .pv-match-result { color: #4caf50; }
    .pv-match.loss .pv-match-result { color: #ef5350; }
    .pv-match-info { font-size: 0.75em; color: var(--text-dim); }

    .pv-match-body { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }

    .pv-match-champ {
        display: flex; align-items: center; gap: 8px; min-width: 0;
    }
    .pv-match-champ img { width: 44px; height: 44px; border-radius: 8px; }
    .pv-match-champ .pmc-name { font-size: 0.85em; font-weight: 600; }
    .pv-match-champ .pmc-kda { font-size: 0.8em; }
    .pv-match-champ .pmc-kda .pmc-k { color: var(--text); font-weight: 700; }
    .pv-match-champ .pmc-kda .pmc-d { color: var(--text-dim); }
    .pv-match-champ .pmc-kda .pmc-a { color: var(--primary); }
    .pv-match-champ .pmc-cs { font-size: 0.7em; color: var(--text-dim); }

    .pv-match-items { display: flex; gap: 3px; flex-wrap: wrap; }
    .pv-match-items img {
        width: 24px; height: 24px; border-radius: 4px;
        border: 1px solid rgba(255,255,255,0.08);
    }

    .pv-match-meta {
        margin-left: auto; text-align: right; font-size: 0.75em; color: var(--text-dim);
    }
    .pv-match-meta .pmm-mode { color: var(--text); font-weight: 600; }

    /* OPPONENTS */
    .pv-opponents {
        margin-top: 8px; padding-top: 8px;
        border-top: 1px solid rgba(255,255,255,0.04);
    }
    .pv-oponents h4 {
        font-size: 0.8em; color: var(--text-dim); margin-bottom: 6px;
    }
    .pv-opponent-row {
        display: flex; align-items: center; gap: 8px; padding: 3px 0;
        font-size: 0.75em;
    }
    .pv-opponent-row img { width: 24px; height: 24px; border-radius: 4px; }
    .pv-opponent-row .pvor-team {
        width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .pv-opponent-row .pvor-team.blue { background: var(--primary); }
    .pv-opponent-row .pvor-team.red { background: var(--accent); }

    /* ============ CBLOL VIEW ============ */
    .cblol-view { animation: fadeIn 0.3s ease; }
    .cblol-header {
        text-align: center; padding: 30px 20px 20px; margin-bottom: 0;
        background: linear-gradient(135deg, #1a0a3e 0%, #0d0d1a 100%);
        border-radius: 16px; margin-bottom: 24px;
    }
    .cblol-header h1 { font-size: 2.2em; margin-bottom: 4px; }
    .cblol-header p { color: var(--text-dim); font-size: 0.9em; }

    .cblol-tabs {
        display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .cblol-tab {
        background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06);
        color: var(--text-dim); padding: 8px 18px; border-radius: 8px;
        font-size: 0.85em; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .cblol-tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .cblol-tab.active { color: var(--primary); background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.2); }

    .cblol-match {
        background: var(--bg-card); border-radius: 14px; padding: 18px; margin-bottom: 12px;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .cm-header {
        font-size: 0.7em; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; font-weight: 600;
    }
    .cm-teams { display: flex; align-items: center; gap: 16px; justify-content: center; margin-bottom: 14px; }
    .cm-team { text-align: center; flex: 1; }
    .cm-team img { width: 48px; height: 48px; object-fit: contain; margin-bottom: 6px; }
    .cm-team .cm-name { font-size: 0.9em; font-weight: 700; }
    .cm-vs { font-size: 1.2em; font-weight: 800; color: var(--text-dim); }

    .cm-result {
        display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 14px;
        font-size: 1.5em; font-weight: 800;
    }
    .cm-winner { color: #4caf50; }
    .cm-loser { color: var(--text-dim); }

    .cm-prediction {
        display: flex; align-items: center; justify-content: center; gap: 12px;
        padding: 12px; background: rgba(0,0,0,0.2); border-radius: 10px;
    }
    .cm-prediction label { font-size: 0.8em; color: var(--text-dim); }
    .cm-prediction select, .cm-prediction input {
        padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
        background: var(--bg-surface); color: var(--text); font-size: 0.85em;
    }
    .cm-prediction .cm-save {
        padding: 6px 16px; border-radius: 6px; border: none;
        background: var(--primary); color: var(--bg-dark); font-weight: 700;
        font-size: 0.85em; cursor: pointer;
    }

    .cm-prediction-result {
        text-align: center; padding: 8px; border-radius: 8px; margin-top: 10px;
        font-size: 0.85em;
    }
    .cm-prediction-result.correct { background: rgba(76,175,80,0.1); color: #4caf50; }
    .cm-prediction-result.wrong { background: rgba(239,83,80,0.1); color: #ef5350; }
    .cm-prediction-result.pending { background: rgba(255,255,255,0.04); color: var(--text-dim); }

    /* RANKING TABLE */
    .ranking-table {
        width: 100%; border-collapse: collapse;
        background: var(--bg-card); border-radius: 12px; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.04);
    }
    .ranking-table th {
        padding: 12px 14px; text-align: left; font-size: 0.7em;
        color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;
        background: rgba(0,0,0,0.2); font-weight: 600;
    }
    .ranking-table td {
        padding: 12px 14px; border-top: 1px solid rgba(255,255,255,0.04);
        font-size: 0.9em;
    }
    .ranking-table tr:first-child td { font-weight: 700; color: var(--primary); }

    /* ============ ARCADE VIEW ============ */
    .arcade-view { animation: fadeIn 0.3s ease; }
    .arcade-header { text-align: center; padding: 30px 20px; margin-bottom: 24px; }
    .arcade-header h1 { font-size: 2em; margin-bottom: 4px; }
    .arcade-game-grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;
    }
    .arcade-game-link {
        display: block; padding: 24px 18px; background: var(--bg-card);
        border-radius: 12px; border: 1px solid rgba(255,255,255,0.04);
        text-align: center; transition: transform 0.2s, box-shadow 0.2s;
        text-decoration: none; color: var(--text);
    }
    .arcade-game-link:hover {
        transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,212,255,0.1);
    }
    .arcade-game-link .agl-icon { font-size: 2.5em; margin-bottom: 8px; }
    .arcade-game-link .agl-name { font-weight: 700; margin-bottom: 4px; }
    .arcade-game-link .agl-desc { font-size: 0.8em; color: var(--text-dim); }

    /* BACK BUTTON */
    .back-btn {
        display: inline-flex; align-items: center; gap: 6px;
        color: var(--text-dim); text-decoration: none; font-size: 0.9em;
        padding: 8px 16px; border-radius: 8px; margin-bottom: 20px;
        transition: color 0.2s, background 0.2s;
        border: 1px solid rgba(255,255,255,0.06);
        background: var(--bg-card); cursor: pointer;
    }
    .back-btn:hover { color: var(--primary); background: rgba(0,212,255,0.05); }

    /* FOOTER */
    .spa-footer {
        margin-top: auto; padding: 20px; text-align: center;
        color: var(--text-dim); font-size: 0.8em;
        border-top: 1px solid rgba(255,255,255,0.04);
    }

    /* NAV ACTIVE STATE (handled by JS) */

    /* LOADER */
    .loader {
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; padding: 60px 20px; gap: 12px;
    }
    .spinner {
        width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.08);
        border-top-color: var(--primary); border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .error-box {
        text-align: center; padding: 40px 20px;
        color: var(--text-dim); font-size: 0.9em;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    /* RESPONSIVE */
    @media (max-width: 760px) {
        .team-grid { grid-template-columns: 1fr; }
        .pv-inner { flex-direction: column; text-align: center; }
        .pv-stats { grid-template-columns: repeat(2, 1fr); }
        .pv-match-body { flex-direction: column; }
        .pv-match-meta { text-align: left; margin-left: 0; }
        .cm-teams { flex-direction: column; gap: 10px; }
        .arcade-game-grid { grid-template-columns: 1fr; }
        .pv-name { font-size: 1.6em; }
        .cblol-header h1 { font-size: 1.6em; }
    }
    </style>
</head>
<body>
    <nav id="main-nav">
        <div class="nav-inner">
            <a href="index.html" class="logo">PROFA <span>GAMES</span></a>
            <div class="nav-links">
                <a href="#team" class="nav-link active" data-page="team">Time</a>
                <a href="#cblol" class="nav-link" data-page="cblol">CBLOL</a>
                <a href="#arcade" class="nav-link" data-page="arcade">Arcade</a>
            </div>
            <button id="mobile-menu-btn" aria-label="Menu">&#9776;</button>
        </div>
    </nav>

    <div id="app">
        <div id="app-content"></div>
    </div>

    <footer class="spa-footer">
        <p>PROFA GAMES &copy; 2026 — Dados da Riot Games API + LoL Esports API. N&atilde;o endossado pela Riot Games.</p>
    </footer>

    <script src="hub.js"></script>
    <script>
(async () => {
    'use strict';

    /* ============================================================
       CONFIG
    ============================================================ */

    // PLAYERS: adicione/remova membros aqui
    const PLAYERS = [
        { name: 'PROF',       tag: 'ANON',      region: 'BR1' },
        { name: 'loadt',      tag: '9753',      region: 'BR1' },
        { name: 'Spring Boot', tag: 'Getss',     region: 'BR1' },
        { name: 'tume',       tag: 'br1',       region: 'BR1' },
        { name: 'Bruvel',     tag: 'BTC',       region: 'BR1' },
        { name: 'Matraca IV', tag: 'kash',      region: 'BR1' }
    ];

    const RIOT_API = localStorage.getItem('lol_key') || 'RGAPI-ac93dba2-2144-4534-a0e6-c1b8d864d0ec';
    const PANDASCORE_TOKEN = localStorage.getItem('pandascore_key') || 'uis6MzuhDthgDwK1vD9q6XIHNZqzKe6B7yngsyPvDXCeRh8Uyw9M';
    const D_VER = '14.24.1';

    /* ============================================================
       HELPERS
    ============================================================ */

    const $ = id => document.getElementById(id);
    const app = $('app-content');

    function fmtDur(s) { return s ? `${(s/60)|0}min` : '?'; }
    function fmtAgo(ts) {
        if (!ts) return '';
        const d = (Date.now() - ts) / 1000;
        if (d < 3600) return `${(d/60)|0}min atr&aacute;s`;
        if (d < 86400) return `${(d/3600)|0}h atr&aacute;s`;
        return `${(d/86400)|0}d atr&aacute;s`;
    }

    function champImg(id) {
        const c = CMAP[id];
        return `https://ddragon.leagueoflegends.com/cdn/${D_VER}/img/champion/${c||'Teemo'}.png`;
    }
    function itemImg(id) {
        if (!id) return '';
        return `https://ddragon.leagueoflegends.com/cdn/${D_VER}/img/item/${id}.png`;
    }
    function profImg(id) {
        return `https://ddragon.leagueoflegends.com/cdn/${D_VER}/img/profileicon/${id}.png`;
    }
    function spellImg(id) {
        return `https://ddragon.leagueoflegends.com/cdn/${D_VER}/img/spell/${id}.png`;
    }

    function modeName(m) {
        return ({CLASSIC:"Summoner's Rift",ARAM:'ARAM',TUTORIAL:'Tutorial'})[m] || m || 'Normal';
    }

    function rankCls(tier) {
        return tier ? `rank-${tier.toLowerCase()}` : '';
    }

    function platform(region) {
        return ({BR1:'br1',NA1:'na1',EUW1:'euw1',EUN1:'eun1',KR:'kr',JP1:'jp1',TR1:'tr1',LA1:'la1',LA2:'la2',OC1:'oc1'})[region] || 'br1';
    }
    function cluster(region) {
        const r = (region||'').toUpperCase();
        if (['NA1','BR1','LA1','LA2','OC1'].includes(r)) return 'americas';
        if (['EUW1','EUN1'].includes(r)) return 'europe';
        return 'asia';
    }

    /* ============================================================
       DATA LOADERS
    ============================================================ */

    let CMAP = {}; // champion key->name map

    async function loadCDragon() {
        try {
            const d = await fetch(`https://ddragon.leagueoflegends.com/cdn/${D_VER}/data/en_US/champion.json`).then(r=>r.json());
            for (const [k,v] of Object.entries(d.data)) CMAP[v.key] = k;
        } catch(_) {}
    }

    async function riot(url) {
        const res = await fetch(url, { headers: { 'X-Riot-Token': RIOT_API } });
        if (!res.ok) { const t = await res.text().catch(()=>''); throw new Error(`${res.status}: ${t}`); }
        return res.json();
    }
    async function riotSilent(url, fb = null) {
        try { return await riot(url); } catch(_) { return fb; }
    }

    async function pandascore(path) {
        const res = await fetch(`https://api.pandascore.co${path}&token=${PANDASCORE_TOKEN}`);
        if (!res.ok) throw new Error(`PandaScore ${res.status}`);
        return res.json();
    }
    async function pandascoreSilent(path, fb = null) {
        try { return await pandascore(path); } catch(_) { return fb; }
    }

    // Cache per player
    const pcache = {};

    async function loadPlayer(idx) {
        if (pcache[idx]) return pcache[idx];

        const p = PLAYERS[idx];
        const c = cluster(p.region);
        const pl = platform(p.region);

        const account = await riot(
            `https://${c}.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${encodeURIComponent(p.name)}/${encodeURIComponent(p.tag)}`
        );
        const puuid = account.puuid;

        const summoner = await riot(
            `https://${pl}.api.riotgames.com/lol/summoner/v4/summoners/by-puuid/${puuid}`
        );

        const league = await riotSilent(
            `https://${pl}.api.riotgames.com/lol/league/v4/entries/by-puuid/${puuid}`, []
        );

        const mastery = await riotSilent(
            `https://${pl}.api.riotgames.com/lol/champion-mastery/v4/champion-masteries/by-puuid/${puuid}/top?count=5`, []
        );

        const matchIds = await riotSilent(
            `https://${c}.api.riotgames.com/lol/match/v5/matches/by-puuid/${puuid}/ids?start=0&count=20`, []
        );

        // Fetch first 8 matches
        const matches = [];
        const n = Math.min(matchIds.length, 8);
        await Promise.all(matchIds.slice(0, n).map(mid =>
            riot(`https://${c}.api.riotgames.com/lol/match/v5/matches/${mid}`)
                .then(d => matches.push(d)).catch(() => {})
        ));

        const data = { account, summoner, league: league||[], mastery: mastery||[], matches };
        pcache[idx] = data;
        return data;
    }

    function navigate(hash) {
        const h = hash.replace(/^#/, '');
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        const activeLink = document.querySelector(`.nav-link[data-page="${activeNav(h)}"]`);
        if (activeLink) activeLink.classList.add('active');

        if (!h || h === 'team') renderTeam();
        else if (h.startsWith('profile/')) renderProfile(h.split('/')[1]);
        else if (h === 'cblol') renderCBLOL();
        else if (h === 'arcade') renderArcade();
        else renderTeam();
    }

    function activeNav(h) {
        if (!h || h === 'team') return 'team';
        if (h.startsWith('profile/')) return 'team';
        if (h === 'cblol') return 'cblol';
        if (h === 'arcade') return 'arcade';
        return 'team';
    }

    async function loadMatches(type) {
        const content = $('cblol-content');
        content.innerHTML = '<div class="loader"><div class="spinner"></div><p>Carregando partidas...</p></div>';

        try {
            // Find CBLOL league
            let leagueId = null;
            const leagues = await pandascore('/lol/leagues?filter[name]=CBLOL');
            if (leagues && leagues.length > 0) leagueId = leagues[0].id;

            let path = `/lol/matches/${type}?`;
            if (leagueId) path += `filter[league_id]=${leagueId}&`;
            path += `page[size]=50`;

            const matches = await pandascore(path);

            if (!matches || matches.length === 0) {
                content.innerHTML = `<div class="error-box"><p>Nenhuma partida ${type==='upcoming'?'próxima encontrada — fora de temporada?':type==='running'?'ao vivo agora':`finalizada encontrada (${type})`}</p></div>`;
                return;
            }

            let html = '';
            for (const m of matches) {
                const opp = m.opponents || [];
                if (opp.length < 2) continue;

                const tA = opp[0]?.opponent;
                const tB = opp[1]?.opponent;
                if (!tA || !tB) continue;

                const matchId = m.id || m.slug || '';
                const date = m.begin_at ? new Date(m.begin_at) : null;
                const status = m.status || 'unknown';
                const nbGames = m.number_of_games || 0;
                const winnerId = m.winner_id;
                const results = m.results || [];
                const detailed_stats = m.detailed_stats || [];

                // Get game wins
                const winsA = detailed_stats?.[0]?.game_wins || (tA.wins || 0);
                const winsB = detailed_stats?.[1]?.game_wins || (tB.wins || 0);
                const scoreA = detailed_stats?.[0]?.score ?? winsA;
                const scoreB = detailed_stats?.[1]?.score ?? winsB;
                const winnerTeam = winnerId === tA.id ? tA : winnerId === tB.id ? tB : null;

                const imgA = tA.image_url || '';
                const imgB = tB.image_url || '';
                const nameA = tA.name || tA.acronym || 'Time A';
                const nameB = tB.name || tB.acronym || 'Time B';
                const codeA = tA.acronym || tA.slug || nameA;
                const codeB = tB.acronym || tB.slug || nameB;
                const slug = tA.slug || '';

                // Only show LoL CBLOL
                if (slug && !slug.toLowerCase().includes('cblol') && !slug.toLowerCase().includes('brazil')) {
                    // Check both teams
                    const slugB = tB.slug || '';
                    if (!slugB.toLowerCase().includes('cblol') && !slugB.toLowerCase().includes('brazil')) continue;
                }

                if (status === 'finished' || status === 'complete') {
                    html += `
                        <div class="cblol-match">
                            <div class="cm-header">${date ? date.toLocaleDateString('pt-BR') : ''} · Finalizada${nbGames > 1 ? ` · Melhor de ${nbGames}` : ''}</div>
                            <div class="cm-teams">
                                <div class="cm-team">
                                    <img src="${imgA}" alt="${nameA}">
                                    <div class="cm-name">${codeA}</div>
                                </div>
                                <div class="cm-vs">vs</div>
                                <div class="cm-team">
                                    <img src="${imgB}" alt="${nameB}">
                                    <div class="cm-name">${codeB}</div>
                                </div>
                            </div>
                            <div class="cm-result">
                                <span class="${winnerTeam===tA?'cm-winner':'cm-loser'}">${scoreA}</span>
                                <span>—</span>
                                <span class="${winnerTeam===tB?'cm-winner':'cm-loser'}">${scoreB}</span>
                            </div>
                            ${renderPredictionResult(matchId, {code:codeA}, {code:codeB}, winnerTeam)}
                        </div>
                    `;
                } else if (status === 'running' || status === 'in_progress') {
                    html += `
                        <div class="cblol-match">
                            <div class="cm-header">🔴 AO VIVO</div>
                            <div class="cm-teams">
                                <div class="cm-team">
                                    <img src="${imgA}" alt="${nameA}">
                                    <div class="cm-name">${codeA}</div>
                                </div>
                                <div class="cm-vs">vs</div>
                                <div class="cm-team">
                                    <img src="${imgB}" alt="${nameB}">
                                    <div class="cm-name">${codeB}</div>
                                </div>
                            </div>
                            <div class="cm-result">
                                <span class="cm-winner">${scoreA}</span>
                                <span>—</span>
                                <span class="cm-winner">${scoreB}</span>
                            </div>
                        </div>
                    `;
                } else {
                    const savedPred = getPrediction(matchId);
                    html += `
                        <div class="cblol-match">
                            <div class="cm-header">${date ? date.toLocaleDateString('pt-BR') + ' às ' + date.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : 'Em breve'}</div>
                            <div class="cm-teams">
                                <div class="cm-team">
                                    <img src="${imgA}" alt="${nameA}">
                                    <div class="cm-name">${codeA}</div>
                                </div>
                                <div class="cm-vs">vs</div>
                                <div class="cm-team">
                                    <img src="${imgB}" alt="${nameB}">
                                    <div class="cm-name">${codeB}</div>
                                </div>
                            </div>
                            <div class="cm-prediction">
                                <label>Palpite:</label>
                                <select id="pred-${matchId}">
                                    <option value="${codeA}" ${savedPred?.winner===codeA?'selected':''}>${codeA}</option>
                                    <option value="${codeB}" ${savedPred?.winner===codeB?'selected':''}>${codeB}</option>
                                </select>
                                <input type="number" id="pred-score-${matchId}" placeholder="Placar" min="0" max="5" value="${savedPred?.score || ''}" style="width:70px;">
                                <button class="cm-save" onclick="savePred('${matchId}')">Salvar</button>
                            </div>
                        </div>
                    `;
                }
            }

            content.innerHTML = html || '<div class="error-box"><p>Nenhuma partida CBLOL encontrada nesta categoria.</p></div>';
        } catch(e) {
            content.innerHTML = `<div class="error-box"><p>Erro ao carregar CBLOL: ${e.message}</p><button onclick="loadMatches('${type}')" style="margin-top:12px;padding:10px 22px;border-radius:8px;background:var(--primary);color:var(--bg-dark);font-weight:600;border:none;cursor:pointer;">Tentar novamente</button></div>`;
        }
    }

    /* ============================================================
       PREDICTIONS
    ============================================================ */

    function getPredKey(mid) { return `pred_${mid}`; }

    function getPrediction(mid) {
        try { return JSON.parse(localStorage.getItem(getPredKey(mid)) || 'null'); } catch(_) { return null; }
    }
    function savePred(mid) {
        const sel = document.getElementById(`pred-${mid}`);
        const score = document.getElementById(`pred-score-${mid}`);
        if (!sel || !score) return;
        localStorage.setItem(getPredKey(mid), JSON.stringify({
            winner: sel.value,
            score: score.value,
            time: Date.now()
        }));
        // Visual feedback
        const btn = document.querySelector(`[onclick="savePred('${mid}')"]`);
        if (btn) { btn.textContent = '✓'; setTimeout(() => btn.textContent = 'Salvar', 1500); }
    }
    window.savePred = savePred;

    function renderPredictionResult(mid, tA, tB, winner) {
        const pred = getPrediction(mid);
        if (!pred) return '<div class="cm-prediction-result pending">Sem palpite salvo</div>';

        const winnerName = winner?.code || winner?.name || '';
        const predWinner = pred.winner;
        const predScore = pred.score;

        if (predWinner === winnerName) {
            return `<div class="cm-prediction-result correct">✓ Acertou! Palpite: ${predWinner} ${predScore ? predScore : ''}</div>`;
        } else {
            return `<div class="cm-prediction-result wrong">✗ Errou! Palpite: ${predWinner} ${predScore ? predScore : ''}</div>`;
        }
    }

    async function renderRanking() {
        const content = $('cblol-content');

        // Calculate prediction scores from localStorage vs finished matches
        const scores = PLAYERS.map(p => ({ name: p.name, correct: 0, total: 0, idx: 0 }));
        PLAYERS.forEach((p, i) => scores[i].idx = i);

        try {
            let leagueId = null;
            const leagues = await pandascore('/lol/leagues?filter[name]=CBLOL');
            if (leagues?.length) leagueId = leagues[0].id;

            const path = `/lol/matches/closed?${leagueId ? `filter[league_id]=${leagueId}&` : ''}page[size]=50`;
            const matches = await pandascoreSilent(path, []);

            if (matches) {
                for (const m of matches) {
                    const mid = m.id || m.slug || '';
                    const pred = getPrediction(mid);
                    if (!pred || !m.winner_id) continue;

                    const winnerOpp = m.opponents?.find(o => o?.opponent?.id === m.winner_id);
                    const winnerCode = winnerOpp?.opponent?.acronym || '';
                    if (!winnerCode) continue;

                    scores.forEach(s => s.total++);
                    if (pred.winner === winnerCode) {
                        scores.forEach(s => s.correct++);
                    }
                }
            }
        } catch(_) {}

        // Sort by correct desc, then name
        const ranked = [...scores].sort((a, b) => b.correct - a.correct || a.name.localeCompare(b.name));

        content.innerHTML = `
            <h3 style="margin-bottom:16px;">🏆 Ranking de Palpites</h3>
            <table class="ranking-table">
                <thead><tr><th>#</th><th>Jogador</th><th>Acertos</th><th>Erros</th><th>Pontos</th></tr></thead>
                <tbody>
                    ${ranked.map((s, i) => `
                        <tr ${i < 3 ? 'style="font-weight:700;"' : ''}>
                            <td>${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)}</td>
                            <td style="cursor:pointer;" onclick="location.hash='profile/${s.idx}'">${s.name}</td>
                            <td style="color:#4caf50;">${s.correct}</td>
                            <td style="color:#ef5350;">${s.total - s.correct}</td>
                            <td style="color:var(--primary);">${s.correct * 10}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
            <p style="margin-top:16px;font-size:0.8em;color:var(--text-dim);">+10 pts por acerto · Clique no jogador para ver o perfil</p>
        `;
    }

    /* ============================================================
       RENDER: ARCADE
    ============================================================ */

    function renderArcade() {
        app.innerHTML = `
            <div style="max-width:900px;margin:0 auto;padding:0 16px;">
                <div class="arcade-view">
                    <div class="arcade-header">
                        <h1>🎮 Arcade</h1>
                        <p style="color:var(--text-dim);">Jogos clássicos pra passar o tempo</p>
                    </div>
                    <div class="arcade-game-grid">
                        <a href="tictactoe.html" class="arcade-game-link">
                            <div class="agl-icon">✕○</div>
                            <div class="agl-name">Jogo da Velha</div>
                            <div class="agl-desc">Contra IA (Minimax) ou 2 jogadores</div>
                        </a>
                        <a href="memory.html" class="arcade-game-link">
                            <div class="agl-icon">🃏</div>
                            <div class="agl-name">Memória</div>
                            <div class="agl-desc">Encontre os pares de cartas</div>
                        </a>
                        <a href="snake.html" class="arcade-game-link">
                            <div class="agl-icon">🐍</div>
                            <div class="agl-name">Snake</div>
                            <div class="agl-desc">Coma, cresça e não bata!</div>
                        </a>
                        <a href="pong.html" class="arcade-game-link">
                            <div class="agl-icon">🏓</div>
                            <div class="agl-name">Pong</div>
                            <div class="agl-desc">Tabela clássica contra a IA</div>
                        </a>
                    </div>
                </div>
            </div>
        `;
    }

    /* ============================================================
       INIT
    ============================================================ */

    await loadCDragon();
    navigate(location.hash || '#team');

})();
    </script>
