<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00d4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PROFA GAMES">
    <meta name="description" content="Squad tracker de LoL, CBLOL ao vivo, rankings e estatísticas">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://ddragon.leagueoflegends.com/cdn/14.24.1/img/profileicon/4644.png">
    <link rel="icon" type="image/png" href="https://ddragon.leagueoflegends.com/cdn/14.24.1/img/profileicon/4644.png">
    <title>PROFA GAMES</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <nav id="main-nav">
        <div class="nav-in">
            <a href="#team" class="logo" style="text-decoration:none;color:inherit;"><img src="https://ddragon.leagueoflegends.com/cdn/14.24.1/img/profileicon/4644.png" alt="" class="logo-icon">PROFA <span>GAMES</span></a>
            <div class="nl" id="nav">
                <a href="#team" class="on" data-p="team">Squad FF</a>
                <a href="#arena" data-p="arena">Arena</a>
                <a href="#dashboard" data-p="dashboard">Dashboard</a>
                <a href="#cblol" data-p="cblol">CBLOL</a>
                <a href="#live" data-p="live">Ao Vivo</a>
                <a href="#chat" data-p="chat">Chat</a>
            </div>
            <a href="https://discord.gg/JGB9SbFc" target="_blank" rel="noopener" class="discord-btn" title="Discord">
                <svg width="20" height="15" viewBox="0 0 71 55" fill="currentColor"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.4 37.4 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.2a58.9 58.9 0 0017.7 9 .2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.8 38.8 0 01-5.5-2.7.2.2 0 01 0-.4l1.1-.9a.2.2 0 01.2 0 42 42 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .4 36.4 36.4 0 01-5.5 2.7.2.2 0 00-.1.3 47.2 47.2 0 003.6 5.9.2.2 0 00.3.1A58.7 58.7 0 0070.4 45.7v-.2C72 30.1 68 16.7 60.2 5a.2.2 0 00-.1-.1zM23.7 37.3c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.9 7.2-6.4 7.2zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2 6.5 3.2 6.4 7.2c0 4-2.8 7.2-6.4 7.2z"/></svg>
            </a>
            <button class="notif-bell" onclick="toggleNotifSettings()" title="Notificações">&#128276;</button>
            <button class="theme-toggle" id="theme-toggle" title="Alternar tema">&#9789;</button>
            <div class="nav-user" id="nav-user"></div>
            <button id="mmb">&#9776;</button>
        </div>
    </nav>
    <!-- Tier List Sidebars -->
    <aside id="sidebar-left" class="tier-sidebar tier-sidebar--left tier-sidebar--collapsed">
        <button class="tier-sidebar__toggle" onclick="this.parentElement.classList.toggle('tier-sidebar--collapsed')" title="Expandir/Minimizar">
            <span class="tier-sidebar__toggle-icon">&#9654;</span>
            <span class="tier-sidebar__toggle-label">TOP WR</span>
        </button>
        <div class="tier-sidebar__body">
            <div class="tier-sidebar__header">
                <span class="tier-sidebar__icon">&#9650;</span>
                <span class="tier-sidebar__title">TOP WIN RATE</span>
            </div>
            <div class="tier-sidebar__list" id="tier-left-list"></div>
            <div class="tier-sidebar__footer">
                <span class="tier-sidebar__src">Platinum+ &bull; Patch Atual</span>
            </div>
        </div>
    </aside>
    <aside id="sidebar-right" class="tier-sidebar tier-sidebar--right tier-sidebar--collapsed">
        <button class="tier-sidebar__toggle" onclick="this.parentElement.classList.toggle('tier-sidebar--collapsed')" title="Expandir/Minimizar">
            <span class="tier-sidebar__toggle-label">LOW WR</span>
            <span class="tier-sidebar__toggle-icon">&#9664;</span>
        </button>
        <div class="tier-sidebar__body">
            <div class="tier-sidebar__header">
                <span class="tier-sidebar__icon">&#9660;</span>
                <span class="tier-sidebar__title">LOW WIN RATE</span>
            </div>
            <div class="tier-sidebar__list" id="tier-right-list"></div>
            <div class="tier-sidebar__footer">
                <span class="tier-sidebar__src">Platinum+ &bull; Patch Atual</span>
            </div>
        </div>
    </aside>

    <div id="app">
        <div id="appc"></div>
    </div>
    <footer class="ft">
        <div class="ft-icons">
            <img src="https://ddragon.leagueoflegends.com/cdn/14.24.1/img/profileicon/29.png" alt="" class="ft-icon">
            <img src="https://ddragon.leagueoflegends.com/cdn/14.24.1/img/profileicon/4644.png" alt="" class="ft-icon">
            <img src="https://ddragon.leagueoflegends.com/cdn/14.24.1/img/profileicon/29.png" alt="" class="ft-icon">
        </div>
        <a href="https://discord.gg/JGB9SbFc" target="_blank" rel="noopener" class="ft-discord">Discord do Squad</a>
        <span>PROFA GAMES &copy; 2026 &mdash; Riot Games API + LoL Esports API. N&atilde;o endossado pela Riot.</span>
    </footer>

    <script src="app.js"></script>
</body>
</html>
