<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFA GAMES</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>
    <nav id="main-nav">
        <div class="nav-in">
            <div class="logo">PROFA <span>GAMES</span></div>
            <div class="nl" id="nav">
                <a href="#team" class="on" data-p="team">Time</a>
                <a href="#cblol" data-p="cblol">CBLOL</a>
                <a href="#arcade" data-p="arcade">Arcade</a>
            </div>
            <button id="mmb">&#9776;</button>
        </div>
    </nav>
    <div id="app">
        <div id="appc"></div>
    </div>
    <footer class="ft">PROFA GAMES &copy; 2026 &mdash; Riot Games API + LoL Esports API. N&atilde;o endossado pela Riot.</footer>

    <script>
    (async() => {
    'use strict';

    // ======================== CONFIG ========================
    const PLAYERS = [
        { name:'PROF',           tag:'ANON',  region:'BR1' },
        { name:'loadt',          tag:'9753',  region:'BR1' },
        { name:'Spring Boot',    tag:'Getss', region:'BR1' },
        { name:'tume',           tag:'br1',   region:'BR1' },
        { name:'Bruvel',         tag:'BTC',   region:'BR1' },
        { name:'Matraca IV',     tag:'kash',  region:'BR1' },
    ];
    const RIOT_KEY = window.PROFA_CONFIG?.riotKey || localStorage.getItem('lol_key') || 'RGAPI-ac93dba2-2144-4534-a0e6-c1b8d864d0ec';
    const ESPORTS_KEY = window.PROFA_CONFIG?.esportsKey || localStorage.getItem('esports_key') || '0TvQnueqKa5mxJntVWt0w4LpLfEkrV1Ta8rQBb9Z';
    const CBLOL = '98767991332355509';
    const DVER = '14.24.1';

    // ======================== UTILS ========================
    const $ = id => document.getElementById(id);
    const app = $('appc');
    const plat = r => ({BR1:'br1',NA1:'na1',EUW1:'euw1',EUN1:'eun1',KR:'kr',TR1:'tr1',LA1:'la1',LA2:'la2',OC1:'oc1'})[r]||'br1';
    const cluster = r => (['NA1','BR1','LA1','LA2','OC1'].includes(r))?'americas':(['EUW1','EUN1'].includes(r))?'europe':'asia';
    const fmtDur = s => s ? `${(s/60)|0}min` : '?';
    const fmtAgo = ts => { if(!ts) return ''; const d=(Date.now()-ts)/1000; return d<3600?`${(d/60)|0}min atr&aacute;s`:d<86400?`${(d/3600)|0}h atr&aacute;s`:`${(d/86400)|0}d atr&aacute;s`; };
    const fmtGold = g => (g/1000).toFixed(1)+'K';
    const fmtTime = s => `${(s/60)|0}min`;
    const champImg = id => `https://ddragon.leagueoflegends.com/cdn/${DVER}/img/champion/${CMAP[id]||'Teemo'}.png`;
    const itemImg = id => id ? `https://ddragon.leagueoflegends.com/cdn/${DVER}/img/item/${id}.png` : '';
    const spellImg = id => `https://ddragon.leagueoflegends.com/cdn/${DVER}/img/spell/${id}.png`;
    const profImg = id => `https://ddragon.leagueoflegends.com/cdn/${DVER}/img/profileicon/${id}.png`;
    const modeName = m => ({CLASSIC:"Summoner's Rift",ARAM:'ARAM',TUTORIAL:'Tutorial'})[m]||m||'Normal';
    const rankCls = t => t ? `rank-${t.toLowerCase()}` : '';

    const dragonEmoji = d => ({ocean:'🌊',infernal:'🔥',cloud:'💨',mountain:'⛰️',elder:'🐲',hextech:'⚡',chemtech:'☣️'})[d]||'🔥';
    const profFallback = `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2316213e%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2260%22 text-anchor=%22middle%22 fill=%22%238892b0%22 font-size=%2250%22>?</text></svg>`;
    const F = `onerror="this.onerror=null;this.src='${profFallback}"`;

    let CMAP = {}; // champion key->name

    // ======================== API ========================
    async function riot(url) {
        const r = await fetch(url, { headers:{ 'X-Riot-Token': RIOT_KEY } });
        if (!r.ok) throw new Error(`${r.status}: ${await r.text().catch(()=>'')}`);
        return r.json();
    }
    async function rots(u, fb=null) { try { return await riot(u); } catch(_) { return fb; } }

    async function esp(url) {
        const full = url.startsWith('http') ? url : `https://esports-api.lolesports.com/persisted/gw${url}`;
        const r = await fetch(full, { headers:{ 'x-api-key': ESPORTS_KEY } });
        if (!r.ok) throw new Error(`Esports ${r.status}: ${await r.text().catch(()=>'')}`);
        return r.json();
    }
    async function esps(u, fb=null) { try { return await esp(u); } catch(_) { return fb; } }

    async function live(u) {
        const full = u.startsWith('http') ? u : `https://feed.lolesports.com/livestats/v1${u}`;
        const r = await fetch(full, { headers:{ 'x-api-key': ESPORTS_KEY } });
        if (!r.ok) return null;
        return r.json();
    }

    // ======================== DATA LAYER ========================
    const cache = {};

    async function loadPlayer(i) {
        if (cache[i]) return cache[i];
        const p = PLAYERS[i];
        const c = cluster(p.region), pl = plat(p.region);

        const account = await riot(`https://${c}.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${encodeURIComponent(p.name)}/${encodeURIComponent(p.tag)}`);
        const summoner = await riot(`https://${pl}.api.riotgames.com/lol/summoner/v4/summoners/by-puuid/${account.puuid}`);
        const league = await rots(`https://${pl}.api.riotgames.com/lol/league/v4/entries/by-puuid/${account.puuid}`, []) || [];
        const mastery = await rots(`https://${pl}.api.riotgames.com/lol/champion-mastery/v4/champion-masteries/by-puuid/${account.puuid}/top?count=5`, []) || [];
        const matchIds = await rots(`https://${c}.api.riotgames.com/lol/match/v5/matches/by-puuid/${account.puuid}/ids?start=0&count=20`, []) || [];

        const matches = [];
        const n = Math.min(matchIds.length, 8);
        await Promise.all(matchIds.slice(0, n).map(mid =>
            riot(`https://${c}.api.riotgames.com/lol/match/v5/matches/${mid}`).then(d => matches.push(d)).catch(() => {})
        ));

        const data = { account, summoner, league, mastery, matches };
        cache[i] = data;
        return data;
    }

    // ======================== ROUTER ========================
    let liveTimer = null;
    function clearLive() { if (liveTimer) { clearInterval(liveTimer); liveTimer=null; } }

    function nav(hash) {
        const h = hash.replace(/^#/,'');
        document.querySelectorAll('.nl a').forEach(a => a.classList.remove('on'));
        const ln = document.querySelector(`.nl a[data-p="${pn(h)}"]`);
        if (ln) ln.classList.add('on');
        clearLive();

        if (!h || h==='team') renderTeam();
        else if (h.startsWith('profile/')) renderProfile(parseInt(h.split('/')[1]));
        else if (h==='cblol') renderCBLOL('upcoming');
        else if (h==='arcade') renderArcade();
        else renderTeam();
    }
    function pn(h) {
        if (!h||h==='team'||h.startsWith('profile/')) return 'team';
        if (h==='cblol') return 'cblol';
        if (h==='arcade') return 'arcade';
        return 'team';
    }
    window.addEventListener('hashchange', () => nav(location.hash));
    document.addEventListener('click', e => {
        if (e.target.closest('a[href^="#"]')) { e.preventDefault(); location.hash=e.target.closest('a').getAttribute('href').slice(1); }
    });
    // Mobile menu
    $('mmb').addEventListener('click', () => $('nav').classList.toggle('open'));
    $('nav').addEventListener('click', () => $('nav').classList.remove('open'));

    // ======================== TEAM ========================
    async function renderTeam() {
        app.innerHTML = `
        <div class="hero"><h1>PROFA <span style="background:linear-gradient(135deg,var(--pri),var(--acc));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">GAMES</span></h1><p>Hub do squad &mdash; perfis, ranked e palpites CBLOL</p></div>
        <div style="max-width:1100px;margin:0 auto;padding:0 24px;">
            <div class="sh"><h2>O Squad</h2></div>
            <div class="tg">${PLAYERS.map((p,i) => `<div class="pc" data-i="${i}" onclick="location.hash='profile/${i}'"><div class="ld"><div class="sp"></div></div></div>`).join('')}</div>
        </div>`;

        PLAYERS.forEach(async (p, i) => {
            const card = document.querySelector(`[data-i="${i}"]`);
            if (!card) return;
            try {
                const d = await loadPlayer(i);
                const s = d.summoner, ic = s.profileIconId || 5885, lv = s.summonerLevel || '?';
                const solo = d.league.find(e => e.queueType==='RANKED_SOLO_5x5');
                const wr = solo ? ((solo.wins/(solo.wins+solo.losses))*100)|0 : null;
                const ago = d.matches[0] ? fmtAgo(d.matches[0].info.gameCreation) : '';
                card.innerHTML = `
                <div class="pch">
                    <div class="pci"><img src="${profImg(ic)}" alt="" ${F}'"></div>
                    <div><div class="pcn">${d.account.gameName||p.name} <span class="t">#${d.account.tagLine||p.tag}</span></div>
                    <div class="cl">N&iacute;vel ${lv}</div></div>
                </div>
                ${solo ? `<div class="pr"><span class="pt ${rankCls(solo.tier)}">${solo.tier} ${solo.rank}</span><span class="pl">${solo.leaguePoints} LP</span><span class="pw">${wr}% WR</span></div>` : `<div class="pn">Sem ranked</div>`}
                ${ago ? `<div class="lr"><span class="dot g"></span> &Uacute;ltima partida ${ago}</div>` : ''}`;
            } catch(_) {
                card.innerHTML = `<div class="pch"><div class="pci" style="display:flex;align-items:center;justify-content:center;background:var(--surf);">?</div><div><div class="pcn">${p.name} <span class="t">#${p.tag}</span></div><div class="cl">Dados indispon&iacute;veis</div></div></div>`;
            }
        });
    }

    // ======================== PROFILE ========================
    function renderProfile(idx) {
        const p = PLAYERS[idx];
        if (!p) { location.hash='team'; return; }
        app.innerHTML = `<div style="max-width:900px;margin:0 auto;padding:0 16px;">
            <button class="bb" onclick="location.hash='team'">&larr; Voltar</button>
            <div class="pv"><div class="ld"><div class="sp"></div><p>Carregando ${p.name}...</p></div></div></div>`;

        loadPlayer(idx).then(d => {
            const {account:a,summoner:s,league:le,mastery:ma,matches:mt} = d;
            const ic = s.profileIconId||5885, lv = s.summonerLevel||'?';
            const solo = le.find(e=>e.queueType==='RANKED_SOLO_5x5');
            const flex2 = le.find(e=>e.queueType==='RANKED_FLEX_SR');
            let tv=0,td=0; le.forEach(e=>{tv+=e.wins||0;td+=e.losses||0;});
            const tg=tv+td, wr2=tg>0?((tv/tg)*100).toFixed(1):'&mdash;';
            let tk=0,tkd=0,ta=0,tcs=0;
            mt.forEach(m=>{const mp=m.info?.participants.find(x=>x.puuid===a.puuid)||{};tk+=mp.kills||0;tkd+=mp.deaths||0;ta+=mp.assists||0;tcs+=(mp.totalMinionsKilled||0)+(mp.neutralMinionsKilled||0);});
            const kda = mt.length>0?((tk+ta)/Math.max(tkd,1)).toFixed(1):'&mdash;';
            const acs = mt.length>0?(tcs/mt.length)|0:0;

            let stats = `<div class="ps">
                <div class="pst"><div class="sm">N&iacute;vel</div><div class="sv">${lv}</div></div>
                <div class="pst"><div class="sm">Partidas</div><div class="sv">${tg}</div><div class="ss">${tv}V ${td}D</div></div>
                <div class="pst"><div class="sm">Win Rate</div><div class="sv">${wr2}%</div></div>
                <div class="pst"><div class="sm">KDA</div><div class="sv">${kda}</div><div class="ss">${tk}K ${tkd}D ${ta}A</div></div>
                <div class="pst"><div class="sm">CS M&eacute;dio</div><div class="sv">${acs}</div></div>
            </div>`;

            // Ranked
            let ranked = '';
            if (le.length) {
                const qn = {'RANKED_SOLO_5x5':'Solo/Duo','RANKED_FLEX_SR':'Flex 5v5'};
                ranked = '<div class="sx"><h3>🏆 Ranked</h3>';
                for (const e of le) {
                    const w2 = ((e.wins/(e.wins+e.losses))*100).toFixed(0);
                    ranked += `<div style="background:var(--card);border-radius:10px;padding:14px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.04);">
                        <div style="font-size:.75em;color:var(--dim);text-transform:uppercase;font-weight:600;">${qn[e.queueType]||e.queueType}</div>
                        <div class="${rankCls(e.tier)}" style="font-size:1.4em;font-weight:900;">${e.tier} ${e.rank} &mdash; ${e.leaguePoints} LP</div>
                        <div style="font-size:.85em;color:var(--dim);">${e.wins}V ${e.losses}D (${w2}% WR)</div>
                        ${e.hotStreak?'<span style="font-size:.75em;color:#ef5350;">🔥 Hot Streak</span> ':''}${e.veteran?'<span style="font-size:.75em;color:#c89b3c;">Veterano</span>':''}</div>`;
                }
                ranked += '</div>';
            }

            // Mastery
            let mas = '';
            if (ma.length) {
                mas = '<div class="sx"><h3>⭐ Maestria</h3><div class="mg">';
                for (const m of ma) {
                    mas += `<div class="mi"><span class="ml">M${m.championLevel}</span><img src="${champImg(m.championId)}" alt="" onerror="this.style.opacity='0.3'"><div class="mn">${CMAP[m.championId]||'?'}</div><div class="mp">${(m.championPoints||0).toLocaleString()} pts</div></div>`;
                }
                mas += '</div></div>';
            }

            // Matches (most recent first)
            let matchs = '';
            const sm = [...mt].reverse();
            if (sm.length) {
                matchs = '<div class="sx"><h3>📜 Partidas Recentes</h3>';
                for (const m of sm) {
                    const mp = m.info?.participants.find(x=>x.puuid===a.puuid)||{};
                    const tw = m.info.teams?.find(t=>t.teamId===mp.teamId)?.win;
                    const dur = m.info.gameDuration, cre = m.info.gameCreation;
                    const k=mp.kills||0, dd=mp.deaths||0, as2=mp.assists||0;
                    const cs2=(mp.totalMinionsKilled||0)+(mp.neutralMinionsKilled||0);
                    const cn = CMAP[mp.championId]||`#${mp.championId}`, cl2=mp.champLevel||'';
                    let items='';
                    for(let j=0;j<=6;j++){if(mp['item'+j]) items+=`<img src="${itemImg(mp['item'+j])}" alt="" loading="lazy">`;}
                    let sums='';
                    if(mp.summoner1Id) sums+=`<img src="${spellImg(mp.summoner1Id)}" style="width:20px;height:20px;border-radius:4px;" loading="lazy">`;
                    if(mp.summoner2Id) sums+=`<img src="${spellImg(mp.summoner2Id)}" style="width:20px;height:20px;border-radius:4px;" loading="lazy">`;
                    const c = tw?'w':'l', res=tw?'VIT&Oacute;RIA':'DERROTA';

                    // Teams
                    const t100=(m.info?.participants||[]).filter(x=>x.teamId===100);
                    const t200=(m.info?.participants||[]).filter(x=>x.teamId===200);
                    const row = (o,lbl='') => {
                        const cn2=CMAP[o.championId]||`#${o.championId}`;
                        return `<div class="or ${o.teamId===100?'b':'r'}">${lbl?'<b>'+lbl+'</b>':'<span style="width:14px;"></span>'}<img src="${champImg(o.championId)}" loading="lazy" onerror="this.style.visibility='hidden'"><span class="on">${o.riotIdGameName||'???'}</span><span class="ok"><b>${o.kills||0}</b>/<span style="color:#ef5350;">${o.deaths||0}</span>/<span style="color:var(--pri);">${o.assists||0}</span></span></div>`;
                    };
                    matchs += `<div class="mc ${c}">
                        <div class="mh"><span class="${c==='w'?'':'l'}">${res}</span><span class="mhi">${fmtDur(dur)} &middot; ${modeName(m.info.gameMode)} &middot; ${fmtAgo(cre)}</span></div>
                        <div class="mb">
                            <div class="mch"><img src="${champImg(mp.championId)}" alt="${cn}" loading="lazy"><div>
                                <div class="mcn">${cn} Nv.${cl2}</div>
                                <div class="kda"><b>${k}</b>/<span style="color:#ef5350;">${dd}</span>/<span style="color:var(--pri);">${as2}</span> KDA</div>
                                <div class="csm">${cs2} CS &middot; Vis&atilde;o ${mp.visionScore||0} &middot; ${mp.goldEarned>0?(mp.goldEarned/1000).toFixed(1)+'K':0} ouro</div>
                                ${sums}
                            </div></div>
                            <div class="mii">${items}</div>
                        </div>
                        <div class="os"><div class="tsr">
                            <div><div class="th"><span class="td b"></span> AZUL (100) ${mp.teamId===100?'&larr; Seu time':''}</div>${t100.map(x=>row(x,x.puuid===a.puuid?'&rarr;':'')).join('')}</div>
                            <div><div class="th"><span class="td r"></span> VERMELHA (200) ${mp.teamId===200?'&larr; Seu time':''}</div>${t200.map(x=>row(x,x.puuid===a.puuid?'&rarr;':'')).join('')}</div>
                        </div></div>
                    </div>`;
                }
                matchs += '</div>';
            }

            const rb = solo ? `<span class="prg">${solo.tier} ${solo.rank} &mdash; ${solo.leaguePoints} LP</span>` : `<span class="prg">N&atilde;o posicionado</span>`;

            app.innerHTML = `<div style="max-width:900px;margin:0 auto;padding:0 16px;">
                <button class="bb" onclick="location.hash='team'">&larr; Voltar</button>
                <div class="pv">
                    <div class="pb"><div class="pbg"></div><div class="pbi">
                        <div class="pi"><img src="${profImg(ic)}" alt="" ${F}'"></div>
                        <div><div class="pn2">${a.gameName||p.name} <span class="t">#${a.tagLine||p.tag}</span></div>
                        <span class="prg">${p.region}</span>${rb}</div>
                    </div></div>
                    ${stats}${ranked}${mas}${matchs}
                </div>
            </div>`;
        }).catch(err => {
            app.innerHTML = `<div style="max-width:900px;margin:0 auto;padding:0 16px;"><button class="bb" onclick="location.hash='team'">&larr; Voltar</button><div class="err"><p style="font-size:2em;margin-bottom:12px;">❌</p><p style="font-size:1.2em;margin-bottom:8px;">Erro ao carregar perfil</p><p>${err.message}</p><button onclick="renderProfile(${idx})" style="margin-top:16px;padding:10px 22px;border-radius:8px;background:var(--pri);color:var(--bg);font-weight:600;border:none;cursor:pointer;">Tentar Novamente</button></div></div>`;
        });
    }

    // ======================== CBLOL ========================
    const tabs = [
        {k:'upcoming',l:'Próximas'}, {k:'running',l:'Ao Vivo'}, {k:'closed',l:'Finalizadas'}, {k:'ranking',l:'Ranking'}
    ];

    function renderCBLOL(tab) {
        tab = tab || 'upcoming';
        app.innerHTML = `<div style="max-width:900px;margin:0 auto;padding:0 16px;">
            <div class="cv">
                <div class="ch2"><h1>CBLOL</h1><p>Acompanhe, palpite e dispute com o squad</p><p style="margin-top:6px;font-size:.75em;color:var(--dim);">Powered by LoL Esports API</p></div>
                <div class="ct">${tabs.map(t=>`<button class="ctb ${t.k===tab?'on':''}" data-t="${t.k}">${t.l}</button>`).join('')}</div>
                <div id="cc"><div class="ld"><div class="sp"></div></div></div>
            </div>
        </div>`;

        document.querySelectorAll('.ctb').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ctb').forEach(b=>b.classList.remove('on'));
                btn.classList.add('on');
                const t = btn.dataset.t;
                if (t==='upcoming') loadSchedule('upcoming');
                else if (t==='running') loadLive();
                else if (t==='closed') loadSchedule('closed');
                else { clearLive(); loadRanking(); }
            });
        });

        if (tab==='running') loadLive();
        else if (tab==='closed') loadSchedule('closed');
        else if (tab==='ranking') loadRanking();
        else loadSchedule('upcoming');
    }

    async function loadSchedule(type) {
        clearLive();
        const cc = $('cc');
        cc.innerHTML = '<div class="ld"><div class="sp"></div></div>';

        const isClosed = type==='closed';
        try {
            let events = [], cursor='', first=true;
            do {
                let u = `https://esports-api.lolesports.com/persisted/gw/getSchedule?hl=pt-BR&leagueId=${CBLOL}`;
                if (!first && isClosed) u += '&old=true';
                if (cursor) u += `&cursor=${cursor}`;
                const data = await esp(u);
                if (!data?.data?.schedule) break;
                const ev = data.data.schedule.events||[];
                events.push(...ev);
                cursor = data.data.schedule.pages?.older||'';
                first = false;
            } while (cursor && (isClosed?events.length<100:false));

            events = events.filter(e => isClosed?(e.state==='completed'):(e.state==='unstarted'));

            if (!events.length) { cc.innerHTML='<div class="err"><p>Nenhuma partida encontrada</p></div>'; return; }

            let html = '';
            for (const ev of events.reverse()) {
                const m = ev.match||{}, ts = m.teams||[];
                if (ts.length<2) continue;
                const tA=ts[0], tB=ts[1];
                const cA=tA.code||tA.name||'A', cB=tB.code||tB.name||'B';
                const nA=tA.name||cA, nB=tB.name||cB;
                const rA=tA.result||{}, rB=tB.result||{};
                const sA=rA.gameWins||0, sB=rB.gameWins||0;
                const wA=rA.outcome==='win', wB=rB.outcome==='win';
                const winner=wA?tA:wB?tB:null;
                const mid = ev.id||m.id||ev.slug||'';
                const dt = ev.startTime ? new Date(ev.startTime) : null;
                const bn = ev.blockName||'';

                if (isClosed) {
                    const ac = {winnerCode:winner?(winner.code||winner.name):'',a:sA,b:sB};
                    html += `<div class="lg">
                        <div class="lgh">${dt?dt.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})+' &middot; ':''}${dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} &middot; ${bn} &middot; Finalizada</div>
                        <div class="lgp"><div class="lgt"><img src="${tA.image||''}"><div class="ln">${cA}</div></div><div class="lvs">vs</div><div class="lgt"><img src="${tB.image||''}"><div class="ln">${cB}</div></div></div>
                        <div class="lrs"><span class="${wA?'lrw':'lrl'}">${sA}</span><span>&mdash;</span><span class="${wB?'lrw':'lrl'}">${sB}</span></div>
                        ${(rA.kills||rA.towers)?renderObjs({a:{k:rA.kills,t:rA.towers,br:rA.barons,d:rA.dragons,i:rA.inhibitors},b:{k:rB.kills,t:rB.towers,br:rB.barons,d:rB.dragons,i:rB.inhibitors}}):''}
                        ${predResult(mid,{code:cA},{code:cB},ac)}
                    </div>`;
                } else {
                    // Determine best of
                    const mo = m.strategy?.type||'';
                    const bo = mo.includes('bestOf') ? parseInt(mo.replace('bestOf','')) : 3;
                    const gn = m.games?.length||0;
                    const bst = gn>0?`MD${gn}`:bo?`M${bo}`:'';
                    const sp = getPred(mid);

                    html += `<div class="lg">
                        <div class="lgh">${dt?dt.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})+' &middot; ':''}${dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})} &middot; ${bn}${bst?' &middot; '+bst:''}</div>
                        <div class="lgp"><div class="lgt"><img src="${tA.image||''}"><div class="ln">${cA}</div></div><div class="lvs">vs</div><div class="lgt"><img src="${tB.image||''}"><div class="ln">${cB}</div></div></div>
                        <div class="prd">
                            <div><label style="font-size:.7em;color:var(--dim);display:block;">Vencedor (10 pts)</label>
                            <select id="pw-${mid}"><option value="${cA}" ${sp?.winner&&sp?.winner===cA?'selected':''}>${cA}</option><option value="${cB}" ${sp?.winner&&sp?.winner===cB?'selected':''}>${cB}</option></select></div>
                            <div><label style="font-size:.7em;color:var(--dim);display:block;">Placar exato (25 pts)</label>
                            <div style="display:flex;align-items:center;gap:6px;">
                            <select id="psa-${mid}" style="width:45px;">${Array.from({length:bo||3},(_,i)=>`<option value="${i}" ${sp?.scoreA===i?'selected':''}>${i}</option>`).join('')}</select>
                            <span style="font-weight:800;">&mdash;</span>
                            <select id="psb-${mid}" style="width:45px;">${Array.from({length:bo||3},(_,i)=>`<option value="${i}" ${sp?.scoreB===i?'selected':''}>${i}</option>`).join('')}</select>
                            </div></div>
                            <button class="sv" onclick="savePred('${mid}')">Salvar</button>
                        </div>
                        ${sp?predPreview(sp,cA,cB):''}
                    </div>`;
                }
            }
            cc.innerHTML = html || '<div class="err"><p>Nenhuma partida encontrada.</p></div>';
        } catch(e) {
            cc.innerHTML = `<div class="err"><p>Erro: ${e.message}</p><button onclick="loadSchedule('${type}')" style="margin-top:12px;padding:10px 22px;border-radius:8px;background:var(--pri);color:var(--bg);font-weight:600;border:none;cursor:pointer;">Tentar novamente</button></div>`;
        }
    }

    // ======================== PREDICTIONS ========================
    const pk = mid => `pred_${mid}`;
    function getPred(mid) { try { return JSON.parse(localStorage.getItem(pk(mid))||'null'); } catch(_) { return null; } }
    function savePred(mid) {
        const w = $(`pw-${mid}`), sa=$(`psa-${mid}`), sb=$(`psb-${mid}`);
        if (!w) return;
        localStorage.setItem(pk(mid), JSON.stringify({winner:w.value,scoreA:sa?.value!=null?+sa.value:null,scoreB:sb?.value!=null?+sb.value:null,time:Date.now()}));
        const btn = document.querySelector(`[onclick="savePred('${mid}')"]`);
        if (btn) { btn.textContent='✓'; setTimeout(()=>btn.textContent='Salvar',1500); }
    }
    function predPreview(sp,a,b) { return `<div class="pr pd">Salvo: ${sp.winner} ${sp.scoreA!=null?'('+sp.scoreA+'—'+sp.scoreB+')':''}</div>`; }
    function predResult(mid,tA,tB,ac) {
        const sp = getPred(mid);
        if (!sp) return '<div class="pr pd">Sem palpite</div>';
        const gw = sp.winner===ac.winnerCode;
        const gs = sp.scoreA!=null&&sp.scoreB!=null&&sp.scoreA===ac.a&&sp.scoreB===ac.b;
        if (gs) return `<div class="pr ex">✓ PERFEITO! +35 pts &middot; ${sp.scoreA}—${sp.scoreB}</div>`;
        if (gw) return `<div class="pr ok">✓ Acertou o vencedor! (+10 pts)</div>`;
        return `<div class="pr no">✗ Errou! Palpite: ${sp.winner}</div>`;
    }

    // ======================== LIVE GAMES ========================
    async function loadLive() {
        const cc = $('cc');
        try {
            const data = await esp('https://esports-api.lolesports.com/persisted/gw/getLive?hl=pt-BR');
            const evs = data?.data?.schedule?.events||[];

            if (!evs.length) {
                cc.innerHTML = '<div class="err"><p style="font-size:1.2em;margin-bottom:8px;">Nenhum jogo ao vivo</p><button onclick="loadLive()" style="margin-top:8px;padding:10px 22px;border-radius:8px;background:var(--pri);color:var(--bg);font-weight:600;border:none;cursor:pointer;">Verificar</button></div>';
                return;
            }

            // CBLOL first
            evs.sort((a,b) => (a.league?.id===CBLOL?0:1)-(b.league?.id===CBLOL?0:1));

            let html = '';
            for (const ev of evs) {
                const m=ev.match||{}, ts=m.teams||[];
                if (ts.length<2) continue;
                const gid = ev.id||m.id||'';
                const ln = ev.league?.name||ev.blockName||'';
                const li = ev.league?.image||'';
                html += `<div class="lg" id="lg-${gid}" data-gid="${gid}" data-ts="${ev.startTime||''}">
                    <div class="lgh"><span class="ldot"></span> AO VIVO${li?`<img src="${li}" style="width:18px;height:18px;object-fit:contain;margin-left:6px;vertical-align:middle;">`:''}${ln?' &middot; '+ln:''}</div>
                    <div class="ldet" onclick="togLive('${gid}','${ev.startTime}')">
                        <div class="lgp"><div class="lgt"><img src="${ts[0].image||''}"><div class="ln">${ts[0].code}</div></div><div class="lvs">vs</div><div class="lgt"><img src="${ts[1].image||''}"><div class="ln">${ts[1].code}</div></div></div>
                        <div class="lrs"><span class="lrw">${ts[0].result?.gameWins||0}</span><span>&mdash;</span><span class="lrw">${ts[1].result?.gameWins||0}</span></div>
                        <div style="text-align:center;font-size:.7em;color:var(--dim);margin-top:4px;">▼ Clique para ver detalhes</div>
                    </div>
                    <div id="lp-${gid}" class="ldp" style="display:none;"></div>
                </div>`;
            }
            cc.innerHTML = html;
            liveTimer = setInterval(refreshLive, 30000);
        } catch(e) {
            cc.innerHTML = `<div class="err"><p>Erro: ${e.message}</p><button onclick="loadLive()" style="margin-top:12px;padding:10px 22px;border-radius:8px;background:var(--pri);color:var(--bg);font-weight:600;border:none;cursor:pointer;">Tentar novamente</button></div>`;
        }
    }

    window.togLive = async (gid, ts) => {
        const p = $(`lp-${gid}`);
        if (!p) return;
        if (p.style.display !== 'none') { p.style.display='none'; return; }
        p.style.display = 'block';
        p.innerHTML = '<div class="ld"><div class="sp"></div></div>';
        await fetchLive(gid, ts, p);
        const el = document.querySelector(`[data-gid="${gid}"] .ldet div:last-child`);
        if (el) el.textContent = '▲ Clique para recolher';
    };

    async function refreshLive() {
        document.querySelectorAll('.ldp[style*="block"]').forEach(p => {
            const lg = p.closest('.lg');
            if (lg) fetchLive(lg.dataset.gid, lg.dataset.ts, p);
        });
    }

    async function fetchLive(gid, ts, p) {
        if (!p) p = $(`lp-${gid}`);
        if (!p) return;
        try {
            const data = await live(`/window/${gid}`);
            if (!data) { p.innerHTML='<div class="err"><p>Dados indispon&iacute;veis</p></div>'; return; }
            const fr = data?.data?.frames||[];
            if (!fr.length) { p.innerHTML='<div class="err"><p>Aguardando dados...</p></div>'; return; }
            const lf = fr[fr.length-1];
            const gm = data?.data?.gameMetadata||{};
            const bm = gm?.blueTeamMetadata||{}, rm = gm?.redTeamMetadata||{};
            const bt = lf.blueTeam||{participants:[],totalGold:0,totalKills:0,towers:0,barons:0,inhibitors:0,dragons:[]};
            const rt = lf.redTeam||{participants:[],totalGold:0,totalKills:0,towers:0,barons:0,inhibitors:0,dragons:[]};
            const gs = lf.gameState||'in_game', gt = lf.gameTime||0;
            const gp = getGP(bt.totalGold, rt.totalGold);

            p.innerHTML = `<div>
                <div style="font-size:.7em;color:var(--dim);text-align:center;margin-bottom:6px;">${fmtTime(gt)} &middot; ${gs==='in_game'?'AO VIVO':gs==='paused'?'PAUSADO':'FINALIZADO'}</div>
                <div class="gbar"><div class="gb-b" style="flex:${gp.b}">${bt.totalGold?fmtGold(bt.totalGold):''}</div><div class="gb-r" style="flex:${gp.r}">${rt.totalGold?fmtGold(rt.totalGold):''}</div></div>
                ${renderObjs({a:{k:bt.totalKills,t:bt.towers,br:bt.barons,i:bt.inhibitors,d:bt.dragons},b:{k:rt.totalKills,t:rt.towers,br:rt.barons,i:rt.inhibitors,d:rt.dragons}})}
                <div class="pgt">${renderPlayers(bt.participants,bm,'b')}${renderPlayers(rt.participants,rm,'r')}</div>
            </div>`;
        } catch(_) { p.innerHTML='<div class="err"><p>Erro ao carregar ao vivo</p></div>'; }
    }

    function getGP(b,r) { const t=b+r; return t?{b:b,r:r}:{b:1,r:1}; }

    function renderObjs(o) {
        const drA = (o.a?.d||[]).map(dragonEmoji).join('');
        const drB = (o.b?.d||[]).map(dragonEmoji).join('');
        return `<div class="objs">
            <div class="og"><span class="ob">${o.a.k||0}</span> ⚔️ <span class="or2">${o.b.k||0}</span></div>
            <div class="og"><span class="ob">${o.a.t||0}</span> 🗼 <span class="or2">${o.b.t||0}</span></div>
            <div class="og"><span class="ob">${o.a.br||0}</span> 🐉 <span class="or2">${o.b.br||0}</span></div>
            <div class="og"><span class="ob">${o.a.i||0}</span> ⛩️ <span class="or2">${o.b.i||0}</span></div>
            ${drA||drB?`<div class="og"><span style="font-size:1.1em;">${drA}</span><span style="font-size:1.1em;">${drB}</span></div>`:''}
        </div>`;
    }

    function renderPlayers(pl,meta,side) {
        if (!pl?.length) return '';
        const nm = side==='b'?'Azul':'Vermelha';
        let h = `<div class="pgs ${side}"><div class="pgh">${nm}</div>`;
        for (const p of pl) {
            const mi = side==='b'?(p.participantId-1):(p.participantId-6);
            const ch = meta?.participantMetadata?.[mi]?.championId||'?';
            const ci = CMAP[ch]||ch;
            const k=p.kills||0,d=p.deaths||0,a=p.assists||0,cs=p.creepScore||0,lv=p.level||0;
            const hp = p.maxHealth>0?((p.currentHealth/p.maxHealth)*100)|0:100;
            const clr = hp>60?'#4caf50':hp>30?'#ff9800':'#ef5350';
            h += `<div class="ppr"><img src="https://ddragon.leagueoflegends.com/cdn/${DVER}/img/champion/${ci||'Teemo'}.png" loading="lazy"><span class="pn3">${ch}</span><span style="font-size:.6em;color:var(--dim);">Lv.${lv}</span><span class="pk"><b>${k}</b>/<span style="color:#ef5350;">${d}</span>/<span style="color:var(--pri);">${a}</span></span><span class="cs">${cs} CS</span><div class="hpb" style="overflow:hidden;">
                <div style="width:${hp}%;height:100%;background:${clr};border-radius:2px;"></div>
            </div></div>`;
        }
        h += '</div>'; return h;
    }

    // ======================== RANKING ========================
    async function loadRanking() {
        const cc = $('cc');
        const sc = PLAYERS.map((p,i) => ({name:p.name,pts:0,ex:0,wn:0,wr:0,tot:0,idx:i}));

        try {
            let evs=[], cursor='', first=true;
            do {
                let u = `https://esports-api.lolesports.com/persisted/gw/getSchedule?hl=pt-BR&leagueId=${CBLOL}`;
                if (!first) u += '&old=true';
                if (cursor) u += `&cursor=${cursor}`;
                const data = await esps(u);
                if (!data?.data?.schedule) break;
                evs.push(...(data.data.schedule.events||[]).filter(e=>e.state==='completed'));
                cursor = data.data.schedule.pages?.older||'';
                first = false;
            } while (cursor && evs.length<200);

            for (const ev of evs) {
                const mid = ev.id||ev.slug||'';
                const sp = getPred(mid);
                if (!sp) continue;
                const ts = ev.match?.teams||[];
                if (ts.length<2) continue;
                const tA=ts[0],tB=ts[1];
                const w = (tA.result?.outcome==='win')?tA:(tB.result?.outcome==='win')?tB:null;
                if (!w) continue;
                const wc = w.code||w.name;
                const sa = tA.result?.gameWins||0, sb = tB.result?.gameWins||0;

                sc.forEach(s => s.tot++);
                const gw = sp.winner===wc;
                const gs = sp.scoreA!=null&&sp.scoreB!=null&&sp.scoreA===sa&&sp.scoreB===sb;
                if (gs) { sc.forEach(s => {s.pts+=35;s.ex++;}); }
                else if (gw) { sc.forEach(s => {s.pts+=10;s.wn++;}); }
                else { sc.forEach(s => s.wr++); }
            }
        } catch(_) {}

        const rk = [...sc].sort((a,b) => b.pts-a.pts||a.name.localeCompare(b.name));
        cc.innerHTML = `<h3 style="margin-bottom:4px;">🏆 Ranking de Palpites</h3>
            <p style="font-size:.75em;color:var(--dim);margin-bottom:16px;">🎯 Vencedor: +10 pts · ⭐ Placar exato: +25 pts · M&aacute;x: 35 pts</p>
            <table class="rt">
            <thead><tr><th>#</th><th>Jogador</th><th>Exato</th><th>Vencedor</th><th>Erros</th><th>Pts</th></tr></thead>
            <tbody>${rk.map((s,i) => {
                const wr = s.tot-s.ex-s.wn;
                return `<tr ${i<3?'style="font-weight:700;"':''}>
                    <td>${['🥇','🥈','🥉',''][i]||(i+1)}</td>
                    <td style="cursor:pointer;" onclick="location.hash='profile/${s.idx}'">${s.name}</td>
                    <td style="color:#4caf50;">${s.ex}</td><td style="color:#ffd740;">${s.wn}</td>
                    <td style="color:#ef5350;">${wr<0?0:wr}</td><td style="color:var(--pri);font-weight:800;">${s.pts}</td></tr>`;
            }).join('')}</tbody></table>
            <p style="margin-top:16px;font-size:.8em;color:var(--dim);">Clique no jogador para ver o perfil</p>`;
    }

    // ======================== ARCADE ========================
    function renderArcade() {
        app.innerHTML = `<div style="max-width:900px;margin:0 auto;padding:0 16px;">
            <div class="av"><div class="ah"><h1>🎮 Arcade</h1><p>Jogos cl&aacute;ssicos pra passar o tempo</p></div>
            <div class="ag">
                <a href="tictactoe.html" class="agl"><div class="ic">✕○</div><div class="nm">Jogo da Velha</div><div class="ds">Contra IA ou 2 jogadores</div></a>
                <a href="memory.html" class="agl"><div class="ic">🃏</div><div class="nm">Mem&oacute;ria</div><div class="ds">Encontre os pares</div></a>
                <a href="snake.html" class="agl"><div class="ic">🐍</div><div class="nm">Snake</div><div class="ds">Coma e cres&ccedil;a!</div></a>
                <a href="pong.html" class="agl"><div class="ic">🏓</div><div class="nm">Pong</div><div class="ds">Tabela cl&aacute;ssica</div></a>
            </div></div></div>`;
    }

    // ======================== INIT ========================
    try {
        const d = await fetch(`https://ddragon.leagueoflegends.com/cdn/${DVER}/data/en_US/champion.json`).then(r=>r.json());
        for (const [k,v] of Object.entries(d.data)) CMAP[v.key] = k;
    } catch(_) {}
    nav(location.hash||'#team');

    })();
    </script>
</body>
