<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFA GAMES — Perfil LoL</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .lol-page {
            padding-top: 82px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        .lol-wrapper {
            max-width: 800px; width: 100%; margin: 40px auto; padding: 32px;
            background: var(--bg-surface); border-radius: var(--card-radius);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* HEADER */
        .lol-header {
            display: flex; align-items: center; gap: 20px; margin-bottom: 24px; flex-wrap: wrap;
        }
        .profile-icon {
            width: 80px; height: 80px; border-radius: 14px; flex-shrink: 0;
            overflow: hidden; border: 3px solid rgba(0,212,255,0.3); background: var(--bg-card);
        }
        .profile-icon img { width: 100%; height: 100%; object-fit: cover; }
        .player-name { font-size: 2em; font-weight: 800; line-height: 1.1; }
        .player-name .tag-part { color: var(--text-dim); font-weight: 400; font-size: 0.55em; }
        .player-region {
            display: inline-block; margin-top: 6px;
            background: rgba(0,212,255,0.15); color: var(--primary);
            padding: 3px 10px; border-radius: 6px; font-size: 0.8em; font-weight: 700;
        }

        /* STATS ROW */
        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }
        .stat-box {
            background: var(--bg-card); border-radius: 12px; padding: 16px; text-align: center;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .stat-box .s-label { font-size: 0.7em; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .stat-box .s-value { font-size: 2em; font-weight: 800; color: var(--primary); }
        .stat-box .s-sub { font-size: 0.7em; color: var(--text-dim); margin-top: 2px; }

        /* SECTION */
        .section-title {
            font-size: 1.15em; margin: 28px 0 12px; color: var(--text);
            display: flex; align-items: center; gap: 8px;
            padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .section-subtitle { font-size: 0.8em; opacity: 0.5; font-weight: normal; }

        /* RANK CARDS */
        .rank-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
        .rank-card {
            background: var(--bg-card); border-radius: 14px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.04); text-align: center;
        }
        .rank-card .queue { font-size: 0.75em; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .rank-card .tier { font-size: 1.5em; font-weight: 900; margin-bottom: 4px; }
        .rank-card .lp { font-size: 0.95em; color: var(--primary); font-weight: 600; margin-bottom: 8px; }
        .rank-card .progression-bar {
            margin-bottom: 10px; height: 5px; background: rgba(255,255,255,0.04);
            border-radius: 3px; overflow: hidden;
        }
        .rank-card .progression-bar .fill {
            height: 100%; background: linear-gradient(90deg, var(--primary), #0ac8b9);
            border-radius: 3px;
        }
        .rank-card .wins-losses { display: flex; justify-content: center; gap: 16px; margin-bottom: 4px; }
        .rank-card .wins { color: #4caf50; font-weight: 700; }
        .rank-card .losses { color: #ef5350; font-weight: 700; }
        .rank-card .winrate { font-size: 0.8em; color: var(--text-dim); }
        .rank-card .badges-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 6px; }
        .rank-badge-tag { font-size: 0.65em; padding: 2px 7px; border-radius: 4px; font-weight: 700; }
        .rank-badge-tag.hot { background: rgba(239,68,68,0.15); color: #ef5350; }
        .rank-badge-tag.vet { background: rgba(200,155,60,0.15); color: #c89b3c; }
        .rank-badge-tag.fresh { background: rgba(76,175,80,0.15); color: #4caf50; }

        /* CURRENT GAME */
        .current-game-card {
            background: var(--bg-card); border-radius: 12px; padding: 16px 18px;
            border: 1px solid rgba(76,175,80,0.2); margin-bottom: 8px;
            display: flex; align-items: center; gap: 14px;
        }
        .current-game-card .cg-details { flex: 1; }
        .current-game-card .cg-label {
            font-size: 0.75em; color: var(--text-dim); margin-bottom: 4px;
            display: flex; align-items: center; gap: 6px;
        }
        .cg-label .dot {
            width: 8px; height: 8px; border-radius: 50%; background: #4caf50;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .current-game-card .cg-champ { font-weight: 700; font-size: 1.1em; }
        .current-game-card .cg-mode { font-size: 0.8em; color: var(--text-dim); }
        .current-game-card img { width: 48px; height: 48px; border-radius: 8px; }

        /* MASTERY */
        .mastery-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .mastery-item {
            background: var(--bg-card); border-radius: 10px; padding: 14px 10px; text-align: center;
            border: 1px solid rgba(255,255,255,0.04); position: relative;
        }
        .mastery-item img { width: 48px; height: 48px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.06); }
        .mastery-item .champ-name { font-size: 0.8em; font-weight: 600; margin-top: 6px; }
        .mastery-item .mastery-level {
            position: absolute; top: 4px; right: 4px;
            background: var(--accent); color: #fff; font-size: 0.6em;
            padding: 2px 5px; border-radius: 4px; font-weight: 800;
        }
        .mastery-item .mastery-p { font-size: 0.7em; color: var(--text-dim); margin-top: 2px; }

        /* MATCH HISTORY */
        .match-list { display: flex; flex-direction: column; gap: 8px; }
        .match-card {
            display: grid; grid-template-columns: 44px 50px 1fr auto; gap: 12px; align-items: center;
            padding: 12px 14px; background: var(--bg-card); border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.04); position: relative; overflow: hidden;
        }
        .match-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
        }
        .match-card.win::before { background: #4caf50; }
        .match-card.loss::before { background: #ef5350; }
        .mc-result { text-align: center; }
        .mc-result .mc-status { font-size: 0.7em; font-weight: 800; text-transform: uppercase; }
        .match-card.win .mc-status { color: #4caf50; }
        .match-card.loss .mc-status { color: #ef5350; }
        .mc-result .mc-kda { font-size: 0.85em; }
        .mc-result .mc-kda .kd { font-weight: 700; color: var(--text); }
        .mc-result .mc-kda .a { color: var(--primary); }
        .mc-result .mc-cs { font-size: 0.7em; color: var(--text-dim); }
        .mc-champ { display: flex; align-items: center; gap: 8px; min-width: 0; }
        .mc-champ img { width: 44px; height: 44px; border-radius: 8px; flex-shrink: 0; }
        .mc-champ .mc-name { font-size: 0.85em; font-weight: 600; }
        .mc-champ .mc-level { font-size: 0.7em; color: var(--text-dim); }
        .mc-items { display: flex; gap: 3px; flex-wrap: wrap; }
        .mc-items img {
            width: 24px; height: 24px; border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .mc-meta { text-align: right; font-size: 0.75em; color: var(--text-dim); }
        .mc-meta .mc-dur { color: var(--text); font-weight: 600; font-size: 1.1em; margin-bottom: 2px; }

        /* RANK COLORS */
        .rank-iron { color: #8a8a8a; } .rank-bronze { color: #cd7f32; }
        .rank-silver { color: #c0c0c0; } .rank-gold { color: #ffd700; }
        .rank-platinum { color: #00c3c3; } .rank-emerald { color: #00c87d; }
        .rank-diamond { color: #6b8cff; } .rank-master { color: #e0448b; }
        .rank-grandmaster { color: #cd163b; } .rank-challenger { color: #e7d952; }

        /* LOADER / ERROR */
        .loader-wrap {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 400px; gap: 16px;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.08); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { text-align: center; padding: 50px 24px; }
        .error-msg .emoji { font-size: 3em; margin-bottom: 12px; }

        @media (max-width: 700px) {
            .lol-wrapper { margin: 16px 8px; padding: 20px 12px; }
            .player-name { font-size: 1.5em; }
            .match-card { grid-template-columns: 40px 42px 1fr; gap: 8px; padding: 10px; }
            .mc-items { display: none; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

        <div class="nav-inner">
            <a href="index.html" class="logo">PROFA <span>GAMES</span></a>
            <div class="nav-links">
                <a href="index.html">Início</a>

        </div>

    <main class="lol-page">
        <div class="lol-wrapper" id="lol-content">
            <div class="loader-wrap">
                <div class="spinner"></div>
                <p>Carregando perfil do League of Legends...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <p>PROFA GAMES &copy; 2026 — Jogos e integrações com HTML, CSS e JavaScript puros.</p>
            <p style="margin-top:4px; opacity:0.5; font-size:0.85em;">Dados da Riot Games API. Não endossado pela Riot Games.</p>
        </div>
    </footer>

    <script src="hub.js"></script>
    <script>
    (() => {
        'use strict';

        // ===== CONFIG: lê do localStorage (definido na página Admin) =====
        const _cfg = JSON.parse(localStorage.getItem('lol_prof') || '{"g":"PROFANON","t":"br1","r":"BR1"}');
        const _key = localStorage.getItem('lol_key') || '';
        const API_KEY = _key || 'RGAPI-ac93dba2-2144-4534-a0e6-c1b8d864d0ec';
        const GAME_NAME = _cfg.g;
        const TAG_LINE = _cfg.t;
        const REGION = _cfg.r || 'BR1';
        // ===== END CONFIG =====

        const container = document.getElementById('lol-content');
        let champMap = {};
        let currentPUUID = '';
        let allMatches = [];

        // Riot API regions
        const BASE = {
            account: 'americas', // account/match API uses clusters
            game: 'br1'         // summoner/league/mastery uses platform
        };

        async function fetchJSON(url) {
            const res = await fetch(url, { headers: { 'X-Riot-Token': API_KEY } });
            if (!res.ok) {
                const t = await res.text().catch(() => '');
                throw new Error(`${res.status}: ${t || res.statusText}`);
            }
            return res.json();
        }
        async function fetchSilent(url, fb = null) {
            try { return await fetchJSON(url); } catch(_) { return fb; }
        }

        /* ===== DATA ===== */
        async function loadChampions() {
            try {
                const d = await fetch('https://ddragon.leagueoflegends.com/cdn/14.24.1/data/en_US/champion.json').then(r => r.json());
                for (const [k,v] of Object.entries(d.data)) champMap[v.key] = k;
            } catch(_) {}
        }

        function champImg(id) {
            const key = champMap[id] || 'Amumu';
            return `https://ddragon.leagueoflegends.com/cdn/14.24.1/img/champion/${key}.png`;
        }
        function itemImg(id) {
            if (!id) return '';
            return `https://ddragon.leagueoflegends.com/cdn/14.24.1/img/item/${id}.png`;
        }
        function profileIcon(id) {
            return `https://ddragon.leagueoflegends.com/cdn/14.24.1/img/profileicon/${id}.png`;
        }

        function fmtDur(s) { if (!s) return '?'; return `${(s/60)|0}min`; }
        function fmtTimeAgo(ts) {
            if (!ts) return '';
            const d = (Date.now() - ts) / 1000;
            if (d < 3600) return `${(d/60)|0}m atrás`;
            if (d < 86400) return `${(d/3600)|0}h atrás`;
            return `${(d/86400)|0}d atrás`;
        }
        function gameMode(mode) {
            return ({CLASSIC:"Summoner's Rift",ARAM:'ARAM',TUTORIAL:'Tutorial'})[mode] || mode || 'Normal';
        }

        /* ===== MAIN ===== */
        async function loadAll() {
            try {
                await loadChampions();

                // 1. Account
                const account = await fetchJSON(
                    `https://${BASE.account}.api.riotgames.com/riot/account/v1/accounts/by-riot-id/${encodeURIComponent(GAME_NAME)}/${encodeURIComponent(TAG_LINE)}`
                );
                currentPUUID = account.puuid;

                // 2. Summoner
                const summoner = await fetchJSON(
                    `https://${BASE.game}.api.riotgames.com/lol/summoner/v4/summoners/by-puuid/${currentPUUID}`
                );

                // 3. League entries
                const league = await fetchSilent(
                    `https://${BASE.game}.api.riotgames.com/lol/league/v4/entries/by-puuid/${currentPUUID}`, []
                );

                // 4. Mastery top champions
                const mastery = await fetchSilent(
                    `https://${BASE.game}.api.riotgames.com/lol/champion-mastery/v4/champion-masteries/by-puuid/${currentPUUID}/top?count=8`, []
                );

                // 5. Current game (spectator)
                const currentGame = await fetchSilent(
                    `https://${BASE.game}.api.riotgames.com/lol/spectator/v5/active-games/by-summoner/${summoner.id}`, null
                );

                // 6. Match IDs (last 20)
                const matchIds = await fetchSilent(
                    `https://${BASE.account}.api.riotgames.com/lol/match/v5/matches/by-puuid/${currentPUUID}/ids?start=0&count=20`, []
                );

                // 7. Match details (first 10, parallel)
                const n = Math.min(matchIds.length, 10);
                const p = [];
                for (let i = 0; i < n; i++) {
                    p.push(
                        fetchJSON(`https://${BASE.account}.api.riotgames.com/lol/match/v5/matches/${matchIds[i]}`)
                            .then(d => { allMatches.push(d); })
                            .catch(() => {})
                    );
                }
                await Promise.all(p);

                render(account, summoner, league || [], mastery || [], currentGame, allMatches);

            } catch(err) {
                console.error(err);
                container.innerHTML = `
                    <div class="error-msg">
                        <div class="emoji">&#10060;</div>
                        <p style="font-size:1.3em; margin-bottom:8px;">Erro ao carregar perfil</p>
                        <p style="color:var(--text-dim); font-size:0.85em; margin-bottom:16px; max-width:460px; margin-left:auto; margin-right:auto;">
                            ${err.message}<br><br>A chave da Riot API pode ter expirado (24h).<br>Atualize a API_KEY no ${'lol.html'} e tente novamente.
                        </p>
                        <button id="retry-btn" style="padding:10px 22px; border-radius:8px; background:var(--primary); color:var(--bg-dark); font-weight:600; border:none; cursor:pointer;">Tentar Novamente</button>
                    </div>
                `;
                document.getElementById('retry-btn').onclick = () => location.reload();
            }
        }

        /* ===== RENDER ===== */
        function render(account, summoner, league, mastery, currentGame, matches) {
            const gameName = account.gameName || GAME_NAME;
            const tagLine = account.tagLine || TAG_LINE;
            const level = summoner.summonerLevel || '—';
            const iconId = summoner.profileIconId || 0;

            // Stats
            const mPts = mastery.reduce((a,m) => a + (m.championPoints||0), 0);
            const wWins = league.reduce((a,e) => a + (e.wins||0), 0);
            const wGames = league.reduce((a,e) => a + (e.wins||0) + (e.losses||0), 0);

            // Banner
            let h = `
                <div class="lol-header">
                    <div class="profile-icon"><img src="${profileIcon(iconId)}" alt="icon"></div>
                    <div>
                        <div class="player-name">${gameName} <span class="tag-part">#${tagLine}</span></div>
                        <span class="player-region">BR1 · Nível ${level}</span>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat-box"><div class="s-label">Nível</div><div class="s-value">${level}</div></div>
                    <div class="stat-box"><div class="s-label">Vitórias</div><div class="s-value">${wWins}</div><div class="s-sub">${wGames} jogos ranked</div></div>
                    <div class="stat-box"><div class="s-label">Maestria</div><div class="s-value">${(mPts/1000).toFixed(0)}K</div><div class="s-sub">${mastery.length} campeões</div></div>
                    <div class="stat-box"><div class="s-label">Partidas</div><div class="s-value">${matches.length}</div><div class="s-sub">mais recentes</div></div>
                </div>
            `;

            // Rank
            if (league.length > 0) {
                const qNames = {'RANKED_SOLO_5x5':'Solo/Duo','RANKED_FLEX_SR':'Flex 5v5','RANKED_FLEX_TT':'Flex 3v3'};
                h += '<div class="section-title">🏆 Ranked <span class="section-subtitle">Fila competitiva</span></div><div class="rank-cards">';
                for (const e of league) {
                    const q = qNames[e.queueType] || e.queueType;
                    const wr = (e.wins||0) + (e.losses||0);
                    const wrate = wr > 0 ? ((e.wins/wr)*100).toFixed(1) : '—';
                    h += `
                        <div class="rank-card">
                            <div class="queue">${q}</div>
                            <div class="tier rank-${(e.tier||'').toLowerCase()}">${e.tier||''} ${e.rank||''}</div>
                            <div class="lp">${e.leaguePoints||0} LP</div>
                            <div class="progression-bar"><div class="fill" style="width:${e.leaguePoints||0}%"></div></div>
                            <div class="badges-row">
                                ${e.hotStreak?'<span class="rank-badge-tag hot">🔥 Hot</span>':''}
                                ${e.veteran?'<span class="rank-badge-tag vet">Veterano</span>':''}
                                ${e.freshBlood?'<span class="rank-badge-tag fresh">Novo</span>':''}
                            </div>
                            <div class="wins-losses">
                                <span class="wins">${e.wins||0}V</span>
                                <span class="losses">${e.losses||0}D</span>
                            </div>
                            <div class="winrate">${wrate}% wr</div>
                        </div>
                    `;
                }
                h += '</div>';
            } else {
                h += '<div class="section-title">🏆 Ranked</div><div class="not-playing" style="background:var(--bg-card);border-radius:12px;padding:16px;text-align:center;color:var(--text-dim);font-size:0.9em;border:1px solid rgba(255,255,255,0.04);">Nenhuma ranked disponível.</div>';
            }

            // Current game
            if (currentGame) {
                const champId = currentGame.championId || 0;
                const mode = currentGame.gameMode || 'Normal';
                h += `
                    <div class="section-title">⚔️ Partida Atual</div>
                    <div class="current-game-card">
                        <div class="cg-details">
                            <div class="cg-label"><span class="dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#4caf50;animation:pulse 1.5s infinite;"></span> Em partida agora</div>
                            <div class="cg-champ">${champMap[champId]||'Champ '+champId}</div>
                            <div class="cg-mode">${mode} · ${fmtDur(currentGame.gameLength)} em jogo</div>
                        </div>
                        <img src="${champImg(champId)}" alt="champ">
                    </div>
                `;
            }

            // Mastery
            if (mastery.length > 0) {
                h += '<div class="section-title">⭐ Maestria Top Campeões <span class="section-subtitle">Mais jogados</span></div><div class="mastery-list">';
                for (const m of mastery) {
                    h += `
                        <div class="mastery-item">
                            <div class="mastery-level">M${m.championLevel}</div>
                            <img src="${champImg(m.championId)}" alt="champ">
                            <div class="champ-name">${champMap[m.championId]||'Champ'}</div>
                            <div class="mastery-p">${(m.championPoints||0).toLocaleString('pt-BR')} pts</div>
                        </div>
                    `;
                }
                h += '</div>';
            }

            // Matches
            if (matches.length > 0) {
                h += '<div class="section-title">📜 Histórico de Partidas <span class="section-subtitle">'+matches.length+' recentes</span></div><div class="match-list">';
                for (const m of matches) {
                    const p = m.info?.participants.find(p => p.puuid === currentPUUID) || {};
                    const teamWin = m.info.teams?.find(t => t.teamId === p.teamId)?.win;
                    const dur = m.info.gameDuration;
                    const created = m.info.gameCreation;
                    const mode = gameMode(m.info.gameMode);
                    const k = p.kills||0, d = p.deaths||0, a = p.assists||0;
                    const cs = (p.totalMinionsKilled||0) + (p.neutralMinionsKilled||0);
                    const gold = (p.goldEarned||0);
                    const champName = champMap[p.championId] || `#${p.championId}`;
                    const lvl = p.champLevel || '';

                    let items = '';
                    for (let i = 0; i <= 6; i++) { if (p['item'+i]) items += `<img src="${itemImg(p['item'+i])}" alt="">`; }

                    const cls = teamWin ? 'win' : 'loss';
                    const st = teamWin ? 'VITÓRIA' : 'DERROTA';

                    h += `
                        <div class="match-card ${cls}">
                            <div class="mc-result">
                                <div class="mc-status">${st}</div>
                                <div class="mc-kda"><span class="kd">${k}</span>/<span class="a">${a}</span></div>
                                <div class="mc-cs">${cs} CS</div>
                            </div>
                            <div class="mc-champ">
                                <img src="${champImg(p.championId)}" alt="${champName}">
                                <div><div class="mc-name">${champName}</div><div class="mc-level">Nv. ${lvl}</div></div>
                            </div>
                            <div class="mc-items">${items}</div>
                            <div class="mc-meta">
                                <div class="mc-dur">${fmtDur(dur)}</div>
                                <div class="mc-mode">${mode}</div>
                                <div class="mc-time">${fmtTimeAgo(created)}</div>
                                <div class="gold">${gold ? (gold/1000).toFixed(1)+'K' : ''}</div>
                            </div>
                        </div>
                    `;
                }
                h += '</div>';
            }

            h += '<div style="margin-top:28px;"><a class="back-link" href="index.html">← Voltar ao início</a></div>';

            container.innerHTML = h;
        }

        loadAll();
    })();
    </script>
</body>
</html>
