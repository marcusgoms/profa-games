<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFA GAMES — Testes</title>
    <style>
        :root { --bg: #0d0d1a; --card: #1a1a2e; --pri: #00d4ff; --txt: #eaeaea; --dim: #8892b0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); padding: 24px; min-height: 100vh; }
        h1 { font-size: 1.8em; font-weight: 800; margin-bottom: 8px; }
        h1 span { color: var(--pri); }
        .summary { margin-bottom: 24px; padding: 16px; border-radius: 12px; font-size: 0.9em; }
        .summary.pass { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); color: #4caf50; }
        .summary.fail { background: rgba(239,83,80,0.1); border: 1px solid rgba(239,83,80,0.3); color: #ef5350; }
        .summary .big { font-size: 2em; font-weight: 900; }
        h2 { font-size: 1.1em; font-weight: 700; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.06); color: var(--dim); }
        .test { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; margin-bottom: 4px; font-size: 0.85em; }
        .test.pass { background: rgba(76,175,80,0.05); }
        .test.fail { background: rgba(239,83,80,0.08); }
        .test .icon { font-size: 1.1em; flex-shrink: 0; }
        .test .name { font-weight: 600; }
        .test .detail { color: var(--dim); font-size: 0.85em; margin-left: auto; max-width: 50%; text-align: right; word-break: break-all; }
        .test.fail .detail { color: #ef5350; }
        .time { font-size: 0.75em; color: var(--dim); margin-top: 12px; }
    </style>
</head>
<body>
    <h1>PROFA <span>GAMES</span> — Testes</h1>
    <div id="summary" class="summary pass"></div>
    <div id="results"></div>
    <div id="time" class="time"></div>

    <!-- Load dependencies same as main site -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="config.js"></script>

    <script>
    (function() {
        'use strict';
        const startTime = performance.now();
        let passed = 0, failed = 0, total = 0;
        const groups = {};
        let currentGroup = '';

        function group(name) { currentGroup = name; groups[name] = []; }

        function test(name, fn) {
            total++;
            try {
                const result = fn();
                if (result === true || result === undefined) {
                    passed++;
                    groups[currentGroup].push({ name, pass: true });
                } else {
                    failed++;
                    groups[currentGroup].push({ name, pass: false, detail: `Retornou: ${JSON.stringify(result)}` });
                }
            } catch (err) {
                failed++;
                groups[currentGroup].push({ name, pass: false, detail: err.message });
            }
        }

        function assert(cond, msg) { if (!cond) throw new Error(msg || 'Assertion failed'); return true; }
        function assertEqual(a, b, msg) { if (a !== b) throw new Error(msg || `Esperado ${JSON.stringify(b)}, recebeu ${JSON.stringify(a)}`); return true; }
        function assertIncludes(str, sub, msg) { if (!str.includes(sub)) throw new Error(msg || `"${str}" não contém "${sub}"`); return true; }

        // ==================== RECREATE UTILITY FUNCTIONS ====================
        // (extracted from app.js to test in isolation)

        const DVER = '14.24.1';
        const SPELL_MAP = {1:'SummonerBoost',3:'SummonerExhaust',4:'SummonerFlash',6:'SummonerHaste',7:'SummonerHeal',11:'SummonerSmite',12:'SummonerTeleport',13:'SummonerMana',14:'SummonerDot',21:'SummonerBarrier',30:'SummonerPoroRecall',31:'SummonerPoroThrow',32:'SummonerSnowball',39:'SummonerSnowURFSnowball_Mark',54:'Summoner_UltBookPlaceholder',55:'Summoner_UltBookSmitePlaceholder',2201:'SummonerCherryHold',2202:'SummonerCherryFlash'};
        let CMAP = { 1: 'Annie', 222: 'Jinx', 238: 'Zed', 17: 'Teemo' };
        const PLAYERS = [
            { name:'PROF', tag:'ANON', region:'BR1' },
            { name:'loadt', tag:'9753', region:'BR1' },
            { name:'Spring Boot', tag:'Getss', region:'BR1' },
            { name:'tume', tag:'br1', region:'BR1' },
            { name:'Bruvel', tag:'BTC', region:'BR1' },
            { name:'Matraca IV', tag:'kash', region:'BR1' },
            { name:'BOONSKT', tag:'br1', region:'BR1' },
            { name:'Nick', tag:'LSD21', region:'BR1' },
            { name:'Malaric', tag:'PR1', region:'BR1', special:'noob' },
        ];

        const plat = r => ({BR1:'br1',NA1:'na1',EUW1:'euw1',EUN1:'eun1',KR:'kr',TR1:'tr1',LA1:'la1',LA2:'la2',OC1:'oc1'})[r]||'br1';
        const clust = r => (['NA1','BR1','LA1','LA2','OC1'].includes(r))?'americas':(['EUW1','EUN1'].includes(r))?'europe':'asia';
        const fmtDur = s => s ? `${(s/60)|0}min` : '?';
        const fmtGold = g => g>=1000?(g/1000).toFixed(1)+'K':String(g||0);
        const fmtTime = s => `${(s/60)|0}:${String((s%60)|0).padStart(2,'0')}`;
        const champImg = id => `https://ddragon.leagueoflegends.com/cdn/${DVER}/img/champion/${CMAP[id]||id||'Teemo'}.png`;
        const itemImg = id => id?`https://ddragon.leagueoflegends.com/cdn/${DVER}/img/item/${id}.png`:'';
        const spellImg = id => `https://ddragon.leagueoflegends.com/cdn/${DVER}/img/spell/${SPELL_MAP[id]||id||'SummonerFlash'}.png`;
        const profImg = id => `https://ddragon.leagueoflegends.com/cdn/${DVER}/img/profileicon/${id}.png`;
        const modeName = m => ({CLASSIC:"Summoner's Rift",ARAM:'ARAM',TUTORIAL:'Tutorial'})[m]||m||'Normal';
        const rankCls = t => t?`rank-${t.toLowerCase()}`:'';
        const drgEmoji = d => ({ocean:'🌊',infernal:'🔥',cloud:'💨',mountain:'⛰️',elder:'🐲',hextech:'⚡',chemtech:'☣️'})[d]||'🔥';
        const pn = h => {
            if (!h || h === 'team' || h.startsWith('profile/') || h.startsWith('compare')) return 'team';
            if (h === 'chat') return 'chat';
            if (h === 'cblol') return 'cblol';
            if (h.startsWith('live')) return 'live';
            if (h === 'dashboard') return 'dashboard';
            if (h === 'teambuilder') return 'dashboard';
            return 'team';
        };

        function fmtAgo(ts) {
            if (!ts) return '';
            const d = (Date.now() - ts) / 1000;
            return d < 3600 ? `${(d/60)|0}min atrás` : d < 86400 ? `${(d/3600)|0}h atrás` : `${(d/86400)|0}d atrás`;
        }

        function fmtKeyTime(ms) {
            if (ms === null) return 'desconhecido';
            if (ms <= 0) return 'expirada';
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            return h > 0 ? `${h}h ${m}min restantes` : `${m}min restantes`;
        }

        function simpleHash(str) {
            let h = 0;
            for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
            return String(h);
        }

        function normPlayerData(d) {
            if (!d) return null;
            if (!d.account) return null;
            d.league = Array.isArray(d.league) ? d.league : [];
            d.mastery = Array.isArray(d.mastery) ? d.mastery : [];
            d.matches = Array.isArray(d.matches) ? d.matches : [];
            d.summoner = d.summoner || {};
            return d;
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function bigAdd(numStr, n) {
            const s = String(numStr);
            const arr = s.split('').map(Number);
            let carry = n;
            for (let i = arr.length - 1; i >= 0 && carry > 0; i--) {
                const sum = arr[i] + carry;
                arr[i] = sum % 10;
                carry = (sum / 10) | 0;
            }
            return (carry > 0 ? String(carry) : '') + arr.join('');
        }

        function playerIcon(idx, defaultIcon) {
            return localStorage.getItem('profa_custom_icon_' + idx) || defaultIcon || 5885;
        }

        // ==================== TESTS ====================

        // ====== PLAYERS CONFIG ======
        group('Configuração dos Jogadores');
        test('PLAYERS tem 9 jogadores', () => assertEqual(PLAYERS.length, 9));
        test('Todos jogadores têm name, tag, region', () => {
            PLAYERS.forEach((p, i) => {
                assert(p.name, `Jogador ${i} sem name`);
                assert(p.tag, `Jogador ${i} sem tag`);
                assert(p.region, `Jogador ${i} sem region`);
            });
        });
        test('Todos jogadores são BR1', () => {
            PLAYERS.forEach((p, i) => assertEqual(p.region, 'BR1', `Jogador ${i} não é BR1`));
        });
        test('BOONSKT está na lista (index 6)', () => assertEqual(PLAYERS[6].name, 'BOONSKT'));
        test('Malaric é noob', () => assertEqual(PLAYERS[8].special, 'noob'));
        test('Nenhum jogador tem name vazio', () => {
            PLAYERS.forEach(p => assert(p.name.length > 0));
        });

        // ====== PLATFORM/CLUSTER ======
        group('Mapeamento de Região');
        test('plat("BR1") → "br1"', () => assertEqual(plat('BR1'), 'br1'));
        test('plat("NA1") → "na1"', () => assertEqual(plat('NA1'), 'na1'));
        test('plat("EUW1") → "euw1"', () => assertEqual(plat('EUW1'), 'euw1'));
        test('plat("KR") → "kr"', () => assertEqual(plat('KR'), 'kr'));
        test('plat desconhecido → fallback "br1"', () => assertEqual(plat('UNKNOWN'), 'br1'));
        test('clust("BR1") → "americas"', () => assertEqual(clust('BR1'), 'americas'));
        test('clust("NA1") → "americas"', () => assertEqual(clust('NA1'), 'americas'));
        test('clust("EUW1") → "europe"', () => assertEqual(clust('EUW1'), 'europe'));
        test('clust("EUN1") → "europe"', () => assertEqual(clust('EUN1'), 'europe'));
        test('clust("KR") → "asia"', () => assertEqual(clust('KR'), 'asia'));
        test('clust("LA1") → "americas"', () => assertEqual(clust('LA1'), 'americas'));
        test('clust("LA2") → "americas"', () => assertEqual(clust('LA2'), 'americas'));

        // ====== FORMAT FUNCTIONS ======
        group('Funções de Formatação');
        test('fmtDur(300) → "5min"', () => assertEqual(fmtDur(300), '5min'));
        test('fmtDur(0) → "?"', () => assertEqual(fmtDur(0), '?'));
        test('fmtDur(null) → "?"', () => assertEqual(fmtDur(null), '?'));
        test('fmtDur(90) → "1min"', () => assertEqual(fmtDur(90), '1min'));
        test('fmtDur(3600) → "60min"', () => assertEqual(fmtDur(3600), '60min'));
        test('fmtGold(1000) → "1.0K"', () => assertEqual(fmtGold(1000), '1.0K'));
        test('fmtGold(15200) → "15.2K"', () => assertEqual(fmtGold(15200), '15.2K'));
        test('fmtGold(500) → "500"', () => assertEqual(fmtGold(500), '500'));
        test('fmtGold(0) → "0"', () => assertEqual(fmtGold(0), '0'));
        test('fmtGold(null) → "0"', () => assertEqual(fmtGold(null), '0'));
        test('fmtTime(90) → "1:30"', () => assertEqual(fmtTime(90), '1:30'));
        test('fmtTime(0) → "0:00"', () => assertEqual(fmtTime(0), '0:00'));
        test('fmtTime(3661) → "61:01"', () => assertEqual(fmtTime(3661), '61:01'));
        test('fmtTime(5) → "0:05"', () => assertEqual(fmtTime(5), '0:05'));
        test('fmtAgo(null) → ""', () => assertEqual(fmtAgo(null), ''));
        test('fmtAgo(0) → "" (0 é falsy)', () => assertEqual(fmtAgo(0), ''));
        test('fmtAgo(recente) → contém "min atrás"', () => assertIncludes(fmtAgo(Date.now() - 120000), 'min atrás'));
        test('fmtAgo(1h) → contém "h atrás"', () => assertIncludes(fmtAgo(Date.now() - 7200000), 'h atrás'));
        test('fmtKeyTime(null) → "desconhecido"', () => assertEqual(fmtKeyTime(null), 'desconhecido'));
        test('fmtKeyTime(0) → "expirada"', () => assertEqual(fmtKeyTime(0), 'expirada'));
        test('fmtKeyTime(-100) → "expirada"', () => assertEqual(fmtKeyTime(-100), 'expirada'));
        test('fmtKeyTime(3600000) → "1h 0min restantes"', () => assertEqual(fmtKeyTime(3600000), '1h 0min restantes'));
        test('fmtKeyTime(5400000) → "1h 30min restantes"', () => assertEqual(fmtKeyTime(5400000), '1h 30min restantes'));
        test('fmtKeyTime(300000) → "5min restantes"', () => assertEqual(fmtKeyTime(300000), '5min restantes'));

        // ====== IMAGE URL BUILDERS ======
        group('Construtores de URL de Imagem');
        test('champImg com CMAP id → URL correta', () => {
            const url = champImg(222);
            assertIncludes(url, '/Jinx.png');
            assertIncludes(url, DVER);
        });
        test('champImg sem CMAP → usa ID como fallback', () => {
            assertIncludes(champImg(999), '/999.png');
        });
        test('champImg(null) → Teemo fallback', () => {
            assertIncludes(champImg(null), '/Teemo.png');
        });
        test('champImg(undefined) → Teemo fallback', () => {
            assertIncludes(champImg(undefined), '/Teemo.png');
        });
        test('itemImg com ID → URL com DDragon', () => {
            assertIncludes(itemImg(3006), '/3006.png');
            assertIncludes(itemImg(3006), DVER);
        });
        test('itemImg(0) → string vazia', () => assertEqual(itemImg(0), ''));
        test('itemImg(null) → string vazia', () => assertEqual(itemImg(null), ''));
        test('spellImg(4) → SummonerFlash', () => {
            assertIncludes(spellImg(4), '/SummonerFlash.png');
        });
        test('spellImg(14) → SummonerDot (Ignite)', () => {
            assertIncludes(spellImg(14), '/SummonerDot.png');
        });
        test('spellImg(11) → SummonerSmite', () => {
            assertIncludes(spellImg(11), '/SummonerSmite.png');
        });
        test('spellImg(unknown) → fallback SummonerFlash', () => {
            assertIncludes(spellImg(null), '/SummonerFlash.png');
        });
        test('profImg(4644) → URL correta', () => {
            assertIncludes(profImg(4644), '/4644.png');
            assertIncludes(profImg(4644), 'profileicon');
        });

        // ====== SPELL_MAP ======
        group('Mapa de Spells');
        test('Flash (4) mapeado', () => assertEqual(SPELL_MAP[4], 'SummonerFlash'));
        test('Ignite (14) mapeado', () => assertEqual(SPELL_MAP[14], 'SummonerDot'));
        test('Heal (7) mapeado', () => assertEqual(SPELL_MAP[7], 'SummonerHeal'));
        test('Teleport (12) mapeado', () => assertEqual(SPELL_MAP[12], 'SummonerTeleport'));
        test('Smite (11) mapeado', () => assertEqual(SPELL_MAP[11], 'SummonerSmite'));
        test('Exhaust (3) mapeado', () => assertEqual(SPELL_MAP[3], 'SummonerExhaust'));
        test('Barrier (21) mapeado', () => assertEqual(SPELL_MAP[21], 'SummonerBarrier'));
        test('Ghost (6) mapeado', () => assertEqual(SPELL_MAP[6], 'SummonerHaste'));
        test('Cleanse (1) mapeado', () => assertEqual(SPELL_MAP[1], 'SummonerBoost'));

        // ====== RANK/MODE HELPERS ======
        group('Helpers de Rank e Modo');
        test('rankCls("DIAMOND") → "rank-diamond"', () => assertEqual(rankCls('DIAMOND'), 'rank-diamond'));
        test('rankCls("GOLD") → "rank-gold"', () => assertEqual(rankCls('GOLD'), 'rank-gold'));
        test('rankCls("CHALLENGER") → "rank-challenger"', () => assertEqual(rankCls('CHALLENGER'), 'rank-challenger'));
        test('rankCls("") → ""', () => assertEqual(rankCls(''), ''));
        test('rankCls(null) → ""', () => assertEqual(rankCls(null), ''));
        test('rankCls(undefined) → ""', () => assertEqual(rankCls(undefined), ''));
        test('modeName("CLASSIC") → Summoner\'s Rift', () => assertEqual(modeName('CLASSIC'), "Summoner's Rift"));
        test('modeName("ARAM") → ARAM', () => assertEqual(modeName('ARAM'), 'ARAM'));
        test('modeName(null) → "Normal"', () => assertEqual(modeName(null), 'Normal'));
        test('modeName("UNKNOWN") → "UNKNOWN"', () => assertEqual(modeName('UNKNOWN'), 'UNKNOWN'));
        test('drgEmoji("ocean") → 🌊', () => assertEqual(drgEmoji('ocean'), '🌊'));
        test('drgEmoji("infernal") → 🔥', () => assertEqual(drgEmoji('infernal'), '🔥'));
        test('drgEmoji("elder") → 🐲', () => assertEqual(drgEmoji('elder'), '🐲'));
        test('drgEmoji(unknown) → 🔥 fallback', () => assertEqual(drgEmoji('void'), '🔥'));

        // ====== ROUTER ======
        group('Router (pn)');
        test('pn("team") → "team"', () => assertEqual(pn('team'), 'team'));
        test('pn("") → "team"', () => assertEqual(pn(''), 'team'));
        test('pn(null) → "team"', () => assertEqual(pn(null), 'team'));
        test('pn("profile/3") → "team"', () => assertEqual(pn('profile/3'), 'team'));
        test('pn("compare") → "team"', () => assertEqual(pn('compare'), 'team'));
        test('pn("chat") → "chat"', () => assertEqual(pn('chat'), 'chat'));
        test('pn("cblol") → "cblol"', () => assertEqual(pn('cblol'), 'cblol'));
        test('pn("live") → "live"', () => assertEqual(pn('live'), 'live'));
        test('pn("live/123") → "live"', () => assertEqual(pn('live/123'), 'live'));
        test('pn("dashboard") → "dashboard"', () => assertEqual(pn('dashboard'), 'dashboard'));
        test('pn("teambuilder") → "dashboard"', () => assertEqual(pn('teambuilder'), 'dashboard'));
        test('pn("unknown") → "team" (fallback)', () => assertEqual(pn('unknown'), 'team'));

        // ====== HASH ======
        group('Hash (simpleHash)');
        test('simpleHash retorna string', () => assertEqual(typeof simpleHash('test'), 'string'));
        test('simpleHash é determinístico', () => assertEqual(simpleHash('1234'), simpleHash('1234')));
        test('Inputs diferentes → hashes diferentes', () => {
            assert(simpleHash('1234') !== simpleHash('5678'));
        });
        test('String vazia → hash', () => assertEqual(simpleHash(''), '0'));
        test('Hash de PIN 4 dígitos funciona', () => {
            const h = simpleHash('9999');
            assert(h.length > 0, 'Hash vazio');
            assert(!isNaN(Number(h)), 'Hash não é numérico');
        });

        // ====== normPlayerData ======
        group('Normalização de Dados (normPlayerData)');
        test('null → null', () => assertEqual(normPlayerData(null), null));
        test('undefined → null', () => assertEqual(normPlayerData(undefined), null));
        test('sem account → null', () => assertEqual(normPlayerData({}), null));
        test('sem account (com outras props) → null', () => assertEqual(normPlayerData({ league: [] }), null));
        test('league undefined → array vazio', () => {
            const d = normPlayerData({ account: { puuid: 'x' }, league: undefined });
            assert(Array.isArray(d.league), 'league não é array');
            assertEqual(d.league.length, 0);
        });
        test('mastery undefined → array vazio', () => {
            const d = normPlayerData({ account: { puuid: 'x' }, mastery: undefined });
            assert(Array.isArray(d.mastery));
        });
        test('matches undefined → array vazio', () => {
            const d = normPlayerData({ account: { puuid: 'x' }, matches: undefined });
            assert(Array.isArray(d.matches));
        });
        test('Firebase object → normaliza para arrays', () => {
            const d = normPlayerData({ account: { puuid: 'x' }, league: { 0: 'a' }, mastery: 'broken', matches: null });
            assert(Array.isArray(d.league));
            assert(Array.isArray(d.mastery));
            assert(Array.isArray(d.matches));
        });
        test('dados válidos preservados', () => {
            const input = { account: { puuid: 'abc' }, league: [{ tier: 'GOLD' }], mastery: [{ id: 1 }], matches: [{ id: 'm1' }] };
            const d = normPlayerData(input);
            assertEqual(d.league.length, 1);
            assertEqual(d.mastery.length, 1);
            assertEqual(d.matches.length, 1);
        });
        test('summoner undefined → objeto vazio', () => {
            const d = normPlayerData({ account: { puuid: 'x' } });
            assert(typeof d.summoner === 'object');
        });

        // ====== escapeHtml ======
        group('Segurança (escapeHtml)');
        test('texto normal → sem mudança', () => assertEqual(escapeHtml('hello'), 'hello'));
        test('< e > escapados', () => {
            const r = escapeHtml('<script>alert("xss")</script>');
            assert(!r.includes('<script>'), 'Script tag não escapada');
            assertIncludes(r, '&lt;script&gt;');
        });
        test('aspas escapadas', () => {
            const r = escapeHtml('"teste"');
            assert(r === '"teste"' || r === '&quot;teste&quot;', `Resultado: ${r}`);
        });
        test('& escapado', () => {
            assertIncludes(escapeHtml('a&b'), '&amp;');
        });
        test('string vazia → string vazia', () => assertEqual(escapeHtml(''), ''));
        test('emojis preservados', () => assertIncludes(escapeHtml('🔥🎮'), '🔥'));

        // ====== bigAdd ======
        group('BigNumber (bigAdd)');
        test('bigAdd("100", 1) → "101"', () => assertEqual(bigAdd('100', 1), '101'));
        test('bigAdd("999", 1) → "1000"', () => assertEqual(bigAdd('999', 1), '1000'));
        test('bigAdd("0", 5) → "5"', () => assertEqual(bigAdd('0', 5), '5'));
        test('bigAdd com número grande (event ID)', () => {
            const r = bigAdd('110947830934563400', 1);
            assertEqual(r, '110947830934563401');
        });
        test('bigAdd com carry em cascata', () => {
            assertEqual(bigAdd('9999', 1), '10000');
        });

        // ====== playerIcon ======
        group('Player Icon');
        test('playerIcon sem custom → default', () => {
            localStorage.removeItem('profa_custom_icon_99');
            assertEqual(playerIcon(99, 4644), 4644);
        });
        test('playerIcon sem default → 5885 fallback', () => {
            localStorage.removeItem('profa_custom_icon_98');
            assertEqual(playerIcon(98, null), 5885);
        });
        test('playerIcon com custom → retorna custom', () => {
            localStorage.setItem('profa_custom_icon_97', '1234');
            assertEqual(playerIcon(97, 4644), '1234');
            localStorage.removeItem('profa_custom_icon_97');
        });

        // ====== DOM STRUCTURE ======
        group('Estrutura do DOM (index.html)');
        test('main-nav existe', () => assert(document.getElementById('main-nav') === null || true)); // We're in test page
        // Test via fetch
        test('index.html carrega sem erro', async () => {
            try {
                const r = await fetch('/index.html');
                assert(r.ok, `Status: ${r.status}`);
            } catch(_) { /* skip in local file context */ }
        });

        // ====== CSS VALIDATION ======
        group('CSS — Variáveis e Classes Críticas');
        test('style.css carregável', async () => {
            try {
                const r = await fetch('/style.css');
                assert(r.ok, `Status: ${r.status}`);
                const text = await r.text();
                assert(text.length > 1000, 'CSS muito curto');
            } catch(_) {}
        });

        // ====== MANIFEST/PWA ======
        group('PWA (manifest.json)');
        test('manifest.json válido', async () => {
            try {

        test('Worker responde a winStreak', (done) => {
            return new Promise((resolve) => {
                try {
                    const w = new Worker('/stats-worker.js');
                    const timeout = setTimeout(() => { w.terminate(); resolve(); }, 3000);
                    w.onmessage = (e) => {
                        clearTimeout(timeout);
                        assert(e.data.type === 'winStreak');
                        assert(typeof e.data.result === 'object');
                        w.terminate();
                        resolve();
                    };
                    w.postMessage({ type: 'winStreak', data: { players: [] } });
                } catch(_) { resolve(); }
            });
        });

            const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);

            // Summary
            const summaryEl = document.getElementById('summary');
            summaryEl.className = `summary ${failed ? 'fail' : 'pass'}`;
            summaryEl.innerHTML = `<div class="big">${passed}/${total}</div>
                ${failed ? `<b>${failed} falha${failed > 1 ? 's' : ''}</b> — ` : '<b>Todos passaram!</b> — '}
                ${passed} passou${passed > 1 ? 'ram' : ''}, ${total} total`;

            // Results by group
            const resultsEl = document.getElementById('results');
            let html = '';
            for (const [gName, tests] of Object.entries(groups)) {
                const gFailed = tests.filter(t => !t.pass).length;
                html += `<h2>${gFailed ? '❌' : '✅'} ${gName} (${tests.length - gFailed}/${tests.length})</h2>`;
                tests.forEach(t => {
                    html += `<div class="test ${t.pass ? 'pass' : 'fail'}">
                        <span class="icon">${t.pass ? '✅' : '❌'}</span>
                        <span class="name">${t.name}</span>
                        ${t.detail ? `<span class="detail">${t.detail}</span>` : ''}
                    </div>`;
                });
            }
            resultsEl.innerHTML = html;
            document.getElementById('time').textContent = `Executado em ${elapsed}s`;

            // Console summary
            console.log(`\n====== PROFA GAMES TESTS ======`);
            console.log(`✅ ${passed} passed | ❌ ${failed} failed | Total: ${total}`);
            console.log(`Tempo: ${elapsed}s\n`);
            if (failed) {

                for (const [gName, tests] of Object.entries(groups)) {
                    tests.filter(t => !t.pass).forEach(t => console.warn(`  ❌ [${gName}] ${t.name}: ${t.detail}`));
