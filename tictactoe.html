<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFA GAMES — Jogo da Velha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="main-nav">
        <div class="nav-inner">
            <a href="index.html" class="logo">PROFA <span>GAMES</span></a>
            <div class="nav-links">
                <a href="index.html">Início</a>
                <a href="snake.html">Snake</a>
                <a href="pong.html">Pong</a>
                <a href="memory.html">Memória</a>
                <a href="tictactoe.html" class="active">Jogo da Velha</a>
            </div>
            <button id="mobile-menu-btn">&#9776;</button>
        </div>
    </nav>

    <main class="game-page">
        <div class="game-wrapper">
            <div class="mode-selector">
                <button class="mode-btn" id="tt-2p">2 Jogadores</button>
                <button class="mode-btn active" id="tt-ai">Contra IA</button>
            </div>
            <div class="difficulty-row" id="tt-diff">
                <button class="diff-btn" id="tt-easy">Fácil</button>
                <button class="diff-btn active" id="tt-hard">Difícil</button>
            </div>
            <div class="scoreboard">
                <div class="score-item"><span class="s-label">X</span><span class="s-value" id="tt-sx">0</span></div>
                <div class="score-item"><span class="s-label">Empates</span><span class="s-value" id="tt-sd">0</span></div>
                <div class="score-item"><span class="s-label">O</span><span class="s-value" id="tt-so">0</span></div>
            </div>
            <div class="tt-board" id="tt-board"></div>
            <div class="game-status" id="tt-status">Vez do jogador <strong id="tt-current">X</strong></div>
            <div class="button-row">
                <button class="btn-primary" id="tt-reset">Reiniciar</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-inner"><p>PROFA GAMES &copy; 2026 — Jogos feitos com HTML, CSS e JavaScript puros.</p></div>
    </footer>

    <script src="hub.js"></script>
    <script src="games/tictactoe.js"></script>
</body>
</html>
